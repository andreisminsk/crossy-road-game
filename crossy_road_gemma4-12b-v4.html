<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossy Road - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="instructions">Use Arrow Keys or WASD to move</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game Constants
        const LANE_WIDTH = 12;
        const ROAD_WIDTH = 10;
        const GRID_SIZE = 20;
        const OBSTACLE_SPEED = 0.15;
        const PLAYER_MOVE_STEP = 1;

        let scene, camera, renderer, player;
        let obstacles = [];
        let score = 0;
        let gameActive = true;
        const keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(10, 20, 10);
            scene.add(sunLight);

            // Ground (Grass)
            const groundGeo = new THREE.PlaneGeometry(300, 300);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d44 }); // Vibrant Green
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Road lanes
            for (let i = -60; i < 60; i += LANE_WIDTH) {
                const roadGeo = new THREE.PlaneGeometry(150, ROAD_WIDTH);
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 }); // Dark Asphalt
                const road = new THREE.Mesh(roadGeo, roadMat);
                road.rotation.x = -Math.PI / 2;
                road.position.z = -i;
                scene.add(road);

                // Lane markings (dashed lines)
                if (i % (LANE_WIDTH * 2) === 0) {
                    const lineGeo = new THREE.PlaneGeometry(150, 1.5);
                    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    const line = new THREE.Mesh(lineGeo, lineMat);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(0, 0.05, -i);
                    scene.add(line);
                }
            }

            // Player (Chicken-like cube)
            const playerGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xffcc00 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0.6, 0);
            scene.add(player);

            // Obstacles (Cars)
            createObstacles();

            window.addEventListener('keydown', (e) => keys[e.key] = true);
            window.addEventListener('keyup', (e) => keys[e.key] = false);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createObstacles() {
            const colors = [0xff3333, 0x3333ff, 0xffff33, 0xffffff, 0x9933ff];
            for (let i = 0; i < 50; i++) {
                const obsGeo = new THREE.BoxGeometry(3, 1.8, 2);
                const obsMat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const obstacle = new THREE.Mesh(obsGeo, obsMat);
                
                // Position on a road lane
                const laneIndex = Math.floor(Math.random() * 12) * LANE_WIDTH;
                obstacle.position.set(
                    (Math.random() - 0.5) * 140,
                    0.9,
                    -Math.random() * 120 - 30
                );
                
                obstacle.userData = {
                    speed: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.2 + 0.1),
                    lane: laneIndex
                };
                
                obstacles.push(obstacle);
                scene.add(obstacle);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Movement logic: Discrete grid-based movement with cooldown
            let moved = false;
            const now = Date.now();
            
            // We check for input and move exactly 1 unit if a key is pressed
            if ((keys['ArrowLeft'] || keys['a']) && player.position.x > -30) {
                player.position.x -= PLAYER_MOVE_STEP;
                moved = true;
            } else if ((keys['ArrowRight'] || keys['d']) && player.position.x < 30) {
                player.position.x += PLAYER_MOVE_STEP;
                moved = true;
            } else if ((keys['ArrowUp'] || keys['w'])) {
                player.position.z -= PLAYER_MOVE_STEP;
                moved = true;
            } else if ((keys['ArrowDown'] || keys['s'])) {
                player.position.z += PLAYER_MOVE_STEP;
                moved = true;
            }

            // Update Score
            score = Math.max(0, Math.floor(Math.abs(player.position.z)));
            document.getElementById('score').innerText = score;

            // Obstacle Movement and Collision
            obstacles.forEach(obs => {
                obs.position.x += obs.userData.speed;
                
                if (obs.position.x > 75) obs.position.x = -75;
                if (obs.position.x < -75) obs.position.x = 75;

                const dx = player.position.x - obs.position.x;
                const dz = player.position.z - obs.position.z;
                
                // Collision check
                if (Math.abs(dx) < 1.5 && Math.abs(dz) < 1.5) {
                    gameActive = false;
                    document.getElementById('instructions').innerHTML = "GAME OVER!<br>Score: " + score + "<br>Refresh to Restart";
                }
            });

            // Camera follows player smoothly
            camera.position.x = player.position.x * 0.5; // Slight horizontal follow
            camera.position.z = player.position.z + 20;
            camera.lookAt(player.position.x, 0, player.position.z - 5);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
