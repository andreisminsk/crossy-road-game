<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossy Road</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Arial, sans-serif; }
  #game { position: fixed; inset: 0; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; }
  #score { position: absolute; top: 18px; left: 22px; color: #fff; font-size: 28px; font-weight: 800;
           text-shadow: 2px 2px 0 rgba(0,0,0,0.35); letter-spacing: 1px; }
  #best { position: absolute; top: 52px; left: 24px; color: #ffe27a; font-size: 16px; font-weight: 700;
          text-shadow: 1px 1px 0 rgba(0,0,0,0.35); }
  #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
             justify-content: center; background: rgba(0,0,0,0.45); z-index: 20; color: #fff; text-align: center; }
  #overlay h1 { font-size: 52px; margin-bottom: 6px; text-shadow: 3px 3px 0 rgba(0,0,0,0.4); }
  #overlay p { font-size: 18px; opacity: 0.9; margin-bottom: 22px; max-width: 420px; line-height: 1.5; }
  #overlay .score-big { font-size: 40px; font-weight: 800; color: #ffe27a; margin: 6px 0 18px; }
  #startBtn { pointer-events: auto; background: #4caf50; border: none; color: #fff; font-size: 22px;
              font-weight: 700; padding: 14px 40px; border-radius: 12px; cursor: pointer;
              box-shadow: 0 5px 0 #2e7d32; transition: transform 0.08s; }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .hint { position: fixed; bottom: 16px; left: 0; width: 100%; text-align: center; color: #fff;
          font-size: 13px; opacity: 0.6; pointer-events: none; z-index: 10; }
  #touch { position: fixed; inset: 0; z-index: 5; }
</style>
</head>
<body>
<div id="game"></div>
<div id="touch"></div>
<div id="ui">
  <div id="score">0</div>
  <div id="best">Best: 0</div>
</div>
<div class="hint">Arrow keys / WASD to move · Swipe on mobile</div>
<div id="overlay">
  <h1>CROSSY ROAD</h1>
  <p>Cross the roads, rivers and railways. Don't get hit, don't fall in the water, and keep moving forward!</p>
  <button id="startBtn">PLAY</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ---------- Constants ----------
const TILE = 1;            // width of a lane row in world units (z spacing)
const LANE_W = 17;         // width of the play field (x extent)
const HALF_W = LANE_W / 2;
const MAX_X = HALF_W - 0.6;
const MIN_X = -HALF_W + 0.6;
const FAR_BEHIND = 12;     // lanes behind player to keep
const FAR_AHEAD = 24;      // lanes ahead to generate
const HOP_TIME = 0.14;     // seconds per hop

// ---------- Renderer / Scene ----------
const container = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9ad7f0);
scene.fog = new THREE.Fog(0x9ad7f0, 22, 42);

const camera = new THREE.OrthographicCamera();
function resizeCamera() {
  const w = window.innerWidth, h = window.innerHeight;
  const aspect = w / h;
  // Fixed world height visible — small value = zoomed in
  const viewSize = 8;
  camera.left = -viewSize * aspect;
  camera.right = viewSize * aspect;
  camera.top = viewSize;
  camera.bottom = -viewSize;
  camera.near = -50;
  camera.far = 100;
  camera.updateProjectionMatrix();
}
resizeCamera();
window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); resizeCamera(); });

// ---------- Lights ----------
const hemi = new THREE.HemisphereLight(0xffffff, 0x88aa66, 0.85);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(-8, 18, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0005;
scene.add(sun);

// ---------- Materials (shared) ----------
const MAT = {
  grass: [new THREE.MeshLambertMaterial({ color: 0x7cbf3a }), new THREE.MeshLambertMaterial({ color: 0x6bb22f })],
  road: new THREE.MeshLambertMaterial({ color: 0x444444 }),
  roadLine: new THREE.MeshLambertMaterial({ color: 0xffffff }),
  water: new THREE.MeshLambertMaterial({ color: 0x3a86c8 }),
  rail: new THREE.MeshLambertMaterial({ color: 0x8a8a8a }),
  tie: new THREE.MeshLambertMaterial({ color: 0x6b4a2b }),
  treeTrunk: new THREE.MeshLambertMaterial({ color: 0x6b4a2b }),
  treeLeaf: new THREE.MeshLambertMaterial({ color: 0x2f8f2f }),
  rock: new THREE.MeshLambertMaterial({ color: 0x9a9a9a }),
  log: new THREE.MeshLambertMaterial({ color: 0x8a5a2b }),
  // chicken
  body: new THREE.MeshLambertMaterial({ color: 0xffffff }),
  beak: new THREE.MeshLambertMaterial({ color: 0xffaa00 }),
  comb: new THREE.MeshLambertMaterial({ color: 0xff3333 }),
  eye: new THREE.MeshLambertMaterial({ color: 0x222222 }),
};

// ---------- Player (Chicken) ----------
const player = new THREE.Group();
function addBox(parent, w, h, d, mat, x, y, z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  parent.add(m);
  return m;
}
// body
addBox(player, 0.6, 0.5, 0.6, MAT.body, 0, 0.35, 0);
// head
addBox(player, 0.4, 0.4, 0.4, MAT.body, 0, 0.8, 0.05);
// beak
addBox(player, 0.18, 0.12, 0.18, MAT.beak, 0, 0.78, 0.32);
// comb
addBox(player, 0.12, 0.14, 0.3, MAT.comb, 0, 1.02, 0.05);
// eyes
addBox(player, 0.08, 0.08, 0.05, MAT.eye, 0.13, 0.86, 0.22);
addBox(player, 0.08, 0.08, 0.05, MAT.eye, -0.13, 0.86, 0.22);
// legs
addBox(player, 0.1, 0.2, 0.1, MAT.beak, -0.15, 0.1, 0);
addBox(player, 0.1, 0.2, 0.1, MAT.beak, 0.15, 0.1, 0);
scene.add(player);

// ---------- Lane system ----------
const lanes = new Map(); // z -> lane object
let furthestZ = 0;       // most forward generated z (negative = forward)
let backZ = 0;           // furthest back generated

function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function makeGround(z, mat) {
  const g = new THREE.Mesh(new THREE.BoxGeometry(LANE_W, 0.3, TILE), mat);
  g.position.set(0, -0.15, z);
  g.receiveShadow = true;
  scene.add(g);
  return g;
}

function makeTree(z, x) {
  const grp = new THREE.Group();
  const h = rand(0.6, 1.3);
  const trunk = addBox(grp, 0.3, h, 0.3, MAT.treeTrunk, 0, h / 2, 0);
  const leaf = addBox(grp, 0.9, 0.7, 0.9, MAT.treeLeaf, 0, h + 0.25, 0);
  grp.position.set(x, 0, z);
  scene.add(grp);
  return grp;
}
function makeRock(z, x) {
  const grp = new THREE.Group();
  addBox(grp, 0.6, 0.4, 0.6, MAT.rock, 0, 0.2, 0);
  grp.position.set(x, 0, z);
  scene.add(grp);
  return grp;
}

function makeCar(z, dir, speed, color) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color });
  addBox(grp, 1.4, 0.5, 0.8, mat, 0, 0.35, 0);
  addBox(grp, 0.9, 0.4, 0.7, mat, -0.1, 0.75, 0);
  // windows
  addBox(grp, 0.8, 0.25, 0.72, MAT.eye, -0.1, 0.78, 0);
  // wheels
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), 0.5, 0.15, 0.45);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), 0.5, 0.15, -0.45);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), -0.5, 0.15, 0.45);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), -0.5, 0.15, -0.45);
  grp.position.set(dir > 0 ? -HALF_W - 2 : HALF_W + 2, 0, z);
  scene.add(grp);
  return { mesh: grp, dir, speed, w: 1.4, d: 0.8 };
}

function makeTruck(z, dir, speed, color) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color });
  const cabMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
  addBox(grp, 1.0, 0.6, 0.85, cabMat, 0.9, 0.4, 0);
  addBox(grp, 0.8, 0.4, 0.75, MAT.eye, 0.9, 0.7, 0);
  addBox(grp, 1.8, 0.9, 0.9, mat, -0.4, 0.5, 0);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), 0.6, 0.15, 0.5);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), 0.6, 0.15, -0.5);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), -0.8, 0.15, 0.5);
  addBox(grp, 0.25, 0.25, 0.2, new THREE.MeshLambertMaterial({ color: 0x111111 }), -0.8, 0.15, -0.5);
  grp.position.set(dir > 0 ? -HALF_W - 2 : HALF_W + 2, 0, z);
  scene.add(grp);
  return { mesh: grp, dir, speed, w: 2.8, d: 0.9 };
}

function makeLog(z, dir, speed, len) {
  const grp = new THREE.Group();
  addBox(grp, len, 0.5, 0.9, MAT.log, 0, 0.05, 0);
  // end caps slightly darker
  addBox(grp, 0.05, 0.45, 0.85, new THREE.MeshLambertMaterial({ color: 0x6b4218 }), len / 2 - 0.02, 0.05, 0);
  addBox(grp, 0.05, 0.45, 0.85, new THREE.MeshLambertMaterial({ color: 0x6b4218 }), -len / 2 + 0.02, 0.05, 0);
  grp.position.set(dir > 0 ? -HALF_W - len : HALF_W + len, 0, z);
  scene.add(grp);
  return { mesh: grp, dir, speed, w: len, d: 0.9, isLog: true };
}

function makeTrain(z, dir, speed) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0xd23333 });
  const dark = new THREE.MeshLambertMaterial({ color: 0x991111 });
  for (let i = 0; i < 3; i++) {
    addBox(grp, 2.2, 0.9, 0.9, mat, i * 2.4 - 2.4, 0.55, 0);
    addBox(grp, 2.0, 0.4, 0.7, MAT.eye, i * 2.4 - 2.4, 0.85, 0);
    addBox(grp, 2.2, 0.15, 0.95, dark, i * 2.4 - 2.4, 0.12, 0);
  }
  grp.position.set(dir > 0 ? -HALF_W - 8 : HALF_W + 8, 0, z);
  scene.add(grp);
  return { mesh: grp, dir, speed, w: 7.5, d: 0.95, isTrain: true };
}

const CAR_COLORS = [0xe53935, 0x1e88e5, 0xfdd835, 0x43a047, 0x8e24aa, 0xfb8c00, 0x00897b, 0xec407a];

function generateLane(z) {
  if (lanes.has(z)) return;
  const lane = { z, type: 'grass', obstacles: [], decorations: [], ground: null, safe: true };

  // Decide type. First few rows are safe grass.
  const dist = -z; // forward progress
  let type;
  if (dist < 2) {
    type = 'grass';
  } else {
    const r = Math.random();
    if (r < 0.34) type = 'grass';
    else if (r < 0.62) type = 'road';
    else if (r < 0.82) type = 'water';
    else type = 'rail';
  }
  lane.type = type;

  if (type === 'grass') {
    lane.ground = makeGround(z, MAT.grass[Math.abs(z) % 2]);
    // decorations: trees/rocks, but keep a path near center sometimes
    const occupied = new Set();
    const count = Math.floor(rand(1, 4));
    for (let i = 0; i < count; i++) {
      const x = Math.round(rand(-HALF_W + 1, HALF_W - 1));
      if (occupied.has(x)) continue;
      // avoid blocking the exact center spawn on first rows
      if (dist < 3 && Math.abs(x) < 2) continue;
      occupied.add(x);
      if (Math.random() < 0.75) lane.decorations.push(makeTree(z, x));
      else lane.decorations.push(makeRock(z, x));
    }
  } else if (type === 'road') {
    lane.ground = makeGround(z, MAT.road);
    lane.safe = false;
    // dashed center line
    for (let x = -HALF_W + 0.5; x < HALF_W; x += 1.2) {
      const line = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.02, 0.08), MAT.roadLine);
      line.position.set(x, 0.01, z);
      scene.add(line);
      lane.decorations.push(line);
    }
    const dir = Math.random() < 0.5 ? 1 : -1;
    const speed = rand(2.5, 5.5) * (1 + dist * 0.004);
    const count = Math.floor(rand(1, 3));
    const isTruck = Math.random() < 0.3;
    for (let i = 0; i < count; i++) {
      const ob = isTruck
        ? makeTruck(z, dir, speed, pick(CAR_COLORS))
        : makeCar(z, dir, speed, pick(CAR_COLORS));
      ob.mesh.position.x += dir * i * rand(5, 8);
      lane.obstacles.push(ob);
    }
  } else if (type === 'water') {
    lane.ground = makeGround(z, MAT.water);
    lane.safe = false;
    lane.isWater = true;
    const dir = Math.random() < 0.5 ? 1 : -1;
    const speed = rand(1.5, 3.2);
    const count = Math.floor(rand(2, 4));
    for (let i = 0; i < count; i++) {
      const len = rand(2.2, 4.0);
      const ob = makeLog(z, dir, speed, len);
      ob.mesh.position.x += dir * i * rand(4, 6);
      lane.obstacles.push(ob);
    }
  } else if (type === 'rail') {
    lane.ground = makeGround(z, MAT.grass[Math.abs(z) % 2]);
    // rails
    const railL = new THREE.Mesh(new THREE.BoxGeometry(LANE_W, 0.08, 0.1), MAT.rail);
    railL.position.set(0, 0.04, z - 0.25); railL.receiveShadow = true; scene.add(railL);
    const railR = new THREE.Mesh(new THREE.BoxGeometry(LANE_W, 0.08, 0.1), MAT.rail);
    railR.position.set(0, 0.04, z + 0.25); railR.receiveShadow = true; scene.add(railR);
    lane.decorations.push(railL, railR);
    // ties
    for (let x = -HALF_W + 0.5; x < HALF_W; x += 0.7) {
      const tie = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.7), MAT.tie);
      tie.position.set(x, 0.03, z); scene.add(tie);
      lane.decorations.push(tie);
    }
    lane.safe = false;
    lane.isRail = true;
    const dir = Math.random() < 0.5 ? 1 : -1;
    const speed = rand(9, 13);
    lane.obstacles.push(makeTrain(z, dir, speed));
    // train starts far off-screen and warns
    lane.trainTimer = rand(2, 6);
    lane.trainActive = false;
  }

  lanes.set(z, lane);
}

function removeLane(z) {
  const lane = lanes.get(z);
  if (!lane) return;
  const kill = (o) => { if (o) { scene.remove(o); disposeObj(o); } };
  kill(lane.ground);
  lane.decorations.forEach(kill);
  lane.obstacles.forEach(o => kill(o.mesh));
  lanes.delete(z);
}
function disposeObj(obj) {
  obj.traverse(c => {
    if (c.geometry) c.geometry.dispose();
    if (c.material) { if (Array.isArray(c.material)) c.material.forEach(m => m.dispose()); else c.material.dispose(); }
  });
}

// ---------- Game state ----------
let state = 'menu'; // menu | play | dead
let score = 0;
let best = +(localStorage.getItem('crossy_best') || 0);
document.getElementById('best').textContent = 'Best: ' + best;

const playerPos = { x: 0, z: 0 }; // logical grid position (z forward = negative)
let hop = null; // { fromX, fromZ, toX, toZ, t }
let onLog = null; // reference to log obstacle
let logOffset = 0;
let idleTimer = 0;
let deathTimer = 0;

function resetGame() {
  // clear lanes
  for (const z of [...lanes.keys()]) removeLane(z);
  lanes.clear();
  furthestZ = 0; backZ = 0;
  score = 0; document.getElementById('score').textContent = '0';
  playerPos.x = 0; playerPos.z = 0;
  player.position.set(0, 0, 0);
  player.rotation.y = 0;
  hop = null; onLog = null; logOffset = 0; idleTimer = 0; deathTimer = 0;
  // generate initial
  for (let z = 4; z >= -FAR_AHEAD; z--) generateLane(z);
  furthestZ = -FAR_AHEAD;
  backZ = 4;
}

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (state === 'menu') { if (e.key === ' ' || e.key === 'Enter') startGame(); return; }
  if (state === 'dead') { if (e.key === ' ' || e.key === 'Enter') startGame(); return; }
  if (e.repeat) return;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') tryMove(0, -1);
  else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') tryMove(0, 1);
  else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') tryMove(-1, 0);
  else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') tryMove(1, 0);
});

// touch swipe
let touchStart = null;
const touchEl = document.getElementById('touch');
touchEl.addEventListener('touchstart', e => {
  if (state !== 'play') return;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
touchEl.addEventListener('touchend', e => {
  if (!touchStart || state !== 'play') return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { tryMove(0, -1); return; } // tap = forward
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
  else tryMove(0, dy > 0 ? 1 : -1);
}, { passive: true });

function startGame() {
  resetGame();
  state = 'play';
  document.getElementById('overlay').style.display = 'none';
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ---------- Movement ----------
function tryMove(dx, dz) {
  if (hop || state !== 'play') return;
  let nx = playerPos.x + dx;
  let nz = playerPos.z + dz;
  // clamp x
  if (nx > MAX_X) nx = MAX_X;
  if (nx < MIN_X) nx = MIN_X;
  // can't go too far back
  if (nz > backZ + 2) nz = backZ + 2;
  // check tree collision on grass
  const targetLane = lanes.get(nz);
  if (targetLane && targetLane.type === 'grass') {
    for (const dec of targetLane.decorations) {
      if (dec.position && Math.abs(dec.position.x - nx) < 0.6) {
        return; // blocked
      }
    }
  }
  hop = { fromX: player.position.x, fromZ: player.position.z, toX: nx, toZ: nz, t: 0 };
  playerPos.x = nx; playerPos.z = nz;
  onLog = null;
  // face direction
  if (dx > 0) player.rotation.y = -Math.PI / 2;
  else if (dx < 0) player.rotation.y = Math.PI / 2;
  else if (dz < 0) player.rotation.y = 0;
  else player.rotation.y = Math.PI;
  idleTimer = 0;
}

// ---------- Update obstacles ----------
function updateObstacles(dt) {
  for (const lane of lanes.values()) {
    if (lane.type === 'rail') {
      // train spawning
      if (!lane.trainActive) {
        lane.trainTimer -= dt;
        if (lane.trainTimer <= 0) {
          lane.trainActive = true;
          lane.warnTimer = 0.8;
        }
      } else {
        if (lane.warnTimer > 0) {
          lane.warnTimer -= dt;
          if (lane.warnTimer <= 0) {
            // launch train
            const ob = lane.obstacles[0];
            ob.mesh.position.x = ob.dir > 0 ? -HALF_W - 8 : HALF_W + 8;
            ob.active = true;
          }
        }
        for (const ob of lane.obstacles) {
          if (!ob.active) continue;
          ob.mesh.position.x += ob.dir * ob.speed * dt;
          if (ob.dir > 0 && ob.mesh.position.x > HALF_W + 10) { ob.active = false; lane.trainActive = false; lane.trainTimer = rand(3, 7); }
          if (ob.dir < 0 && ob.mesh.position.x < -HALF_W - 10) { ob.active = false; lane.trainActive = false; lane.trainTimer = rand(3, 7); }
        }
      }
      continue;
    }
    for (const ob of lane.obstacles) {
      ob.mesh.position.x += ob.dir * ob.speed * dt;
      const limit = HALF_W + ob.w + 2;
      if (ob.dir > 0 && ob.mesh.position.x > limit) ob.mesh.position.x = -limit;
      if (ob.dir < 0 && ob.mesh.position.x < -limit) ob.mesh.position.x = limit;
    }
  }
}

// ---------- Collision ----------
function checkCollisions() {
  const lane = lanes.get(playerPos.z);
  if (!lane) return;
  const px = player.position.x;
  const pz = player.position.z;

  if (lane.isWater) {
    // must be on a log
    let onAny = null;
    for (const ob of lane.obstacles) {
      const lx = ob.mesh.position.x;
      if (px > lx - ob.w / 2 - 0.3 && px < lx + ob.w / 2 + 0.3) {
        onAny = ob; break;
      }
    }
    if (!onAny) { die('splash'); return; }
    onLog = onAny;
  } else {
    onLog = null;
    for (const ob of lane.obstacles) {
      if (lane.isRail && !ob.active) continue;
      const lx = ob.mesh.position.x;
      const halfW = ob.w / 2 + 0.3;
      const halfD = ob.d / 2 + 0.3;
      if (Math.abs(px - lx) < halfW && Math.abs(pz - ob.mesh.position.z) < halfD) {
        die(ob.isTrain ? 'train' : 'car');
        return;
      }
    }
  }
}

function die(cause) {
  if (state !== 'play') return;
  state = 'dead';
  deathTimer = 0;
  deathCause = cause;
  if (score > best) { best = score; localStorage.setItem('crossy_best', best); document.getElementById('best').textContent = 'Best: ' + best; }
}

let deathCause = '';

// ---------- Lane streaming ----------
function streamLanes() {
  // generate ahead
  while (furthestZ > playerPos.z - FAR_AHEAD) {
    furthestZ--;
    generateLane(furthestZ);
  }
  // generate behind a little
  while (backZ < playerPos.z + FAR_BEHIND) {
    backZ++;
    generateLane(backZ);
  }
  // remove far behind
  for (const z of [...lanes.keys()]) {
    if (z > playerPos.z + FAR_BEHIND + 3) removeLane(z);
  }
}

// ---------- Camera ----------
function updateCamera(dt) {
  // Follow from behind and above, looking forward over the player's shoulder
  const targetX = player.position.x * 0.5;
  const targetZ = player.position.z + 5.5;   // behind the player (z+ is behind)
  camera.position.x += (targetX - camera.position.x) * Math.min(1, dt * 6);
  camera.position.z += (targetZ - camera.position.z) * Math.min(1, dt * 5);
  camera.position.y = 7.5;
  // Look at a point ahead of and slightly below the player
  camera.lookAt(camera.position.x * 0.7, 0.5, player.position.z - 4);
}

// ---------- Main loop ----------
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  if (state === 'play') {
    updateObstacles(dt);

    // hop animation
    if (hop) {
      hop.t += dt / HOP_TIME;
      if (hop.t >= 1) {
        hop.t = 1;
        player.position.x = hop.toX;
        player.position.z = hop.toZ;
        player.position.y = 0;
        hop = null;
        checkCollisions();
        // update score
        if (-playerPos.z > score) {
          score = -playerPos.z;
          document.getElementById('score').textContent = score;
        }
      } else {
        const e = hop.t;
        player.position.x = hop.fromX + (hop.toX - hop.fromX) * e;
        player.position.z = hop.fromZ + (hop.toZ - hop.fromZ) * e;
        player.position.y = Math.sin(e * Math.PI) * 0.5;
      }
    } else {
      // ride log
      if (onLog) {
        player.position.x += onLog.dir * onLog.speed * dt;
        playerPos.x = player.position.x;
        if (player.position.x < MIN_X - 0.5 || player.position.x > MAX_X + 0.5) {
          die('splash');
        }
      }
      // idle death (eagle) after long wait
      idleTimer += dt;
      if (idleTimer > 18) die('idle');
    }

    streamLanes();
    updateCamera(dt);
  } else if (state === 'dead') {
    deathTimer += dt;
    // death animation
    if (deathCause === 'splash') {
      player.position.y -= dt * 3;
      player.rotation.x += dt * 4;
    } else if (deathCause === 'car' || deathCause === 'train') {
      player.scale.y = Math.max(0.1, player.scale.y - dt * 2);
    } else {
      player.position.y += dt * 2;
    }
    if (deathTimer > 1.4) showGameOver();
  } else {
    // menu: gentle camera orbit, closer
    camera.position.set(Math.sin(now * 0.0003) * 3, 7.5, 5.5);
    camera.lookAt(0, 0.5, -4);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

function showGameOver() {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>GAME OVER</h1>
    <div class="score-big">${score}</div>
    <p>Best: ${best}</p>
    <button id="startBtn">PLAY AGAIN</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
  state = 'menu';
}

// init menu scene
resetGame();
state = 'menu';
requestAnimationFrame(loop);
</script>
</body>
