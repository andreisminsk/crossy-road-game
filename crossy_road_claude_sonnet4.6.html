<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossy Road</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
  #canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; user-select: none;
  }
  #score-display {
    position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
    font-size: 52px; font-weight: 900; color: #fff;
    text-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 0 20px rgba(255,220,50,0.3);
    letter-spacing: 2px;
  }
  #best-display {
    position: absolute; top: 88px; left: 50%; transform: translateX(-50%);
    font-size: 18px; color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10, 10, 30, 0.82);
    backdrop-filter: blur(4px);
    pointer-events: all;
    transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .game-title {
    font-size: 62px; font-weight: 900; color: #FFD93D;
    text-shadow: 0 6px 0 #c49b00, 0 10px 30px rgba(255,217,61,0.4);
    letter-spacing: 4px; margin-bottom: 8px;
  }
  .sub-title {
    font-size: 18px; color: rgba(255,255,255,0.5);
    margin-bottom: 48px; letter-spacing: 2px;
  }
  #death-score {
    display: none;
    font-size: 28px; color: #fff; margin-bottom: 8px;
    text-align: center;
  }
  #death-best {
    display: none;
    font-size: 16px; color: #FFD93D; margin-bottom: 40px;
  }
  .btn {
    padding: 18px 56px; font-size: 22px; font-weight: 900;
    background: #FFD93D; color: #1a1a2e;
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 6px 0 #c49b00, 0 10px 30px rgba(255,217,61,0.3);
    letter-spacing: 2px; transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #c49b00, 0 14px 40px rgba(255,217,61,0.4); }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #c49b00; }
  #controls-hint {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font-size: 13px; letter-spacing: 1px;
    text-align: center; line-height: 1.8;
    pointer-events: none;
  }
  #touch-zones {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; pointer-events: all;
  }
  .touch-zone {
    position: absolute; opacity: 0;
  }
  #tz-up    { top: 0; left: 25%; right: 25%; height: 40%; }
  #tz-down  { bottom: 0; left: 25%; right: 25%; height: 40%; }
  #tz-left  { top: 0; left: 0; width: 25%; height: 100%; }
  #tz-right { top: 0; right: 0; width: 25%; height: 100%; }
  @media (pointer: coarse) { #touch-zones { display: block; } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="score-display">0</div>
  <div id="best-display">BEST: 0</div>
  <div id="overlay">
    <div class="game-title">🐔 CROSSY</div>
    <div class="sub-title">HOP TO THE OTHER SIDE</div>
    <div id="death-score"></div>
    <div id="death-best"></div>
    <button class="btn" id="start-btn">PLAY</button>
  </div>
  <div id="touch-zones">
    <div class="touch-zone" id="tz-up"></div>
    <div class="touch-zone" id="tz-down"></div>
    <div class="touch-zone" id="tz-left"></div>
    <div class="touch-zone" id="tz-right"></div>
  </div>
  <div id="controls-hint">↑ ↓ ← → or WASD to move</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const TILE = 1.6;
const COLS = 13;       // total columns (-6..+6)
const HALF = Math.floor(COLS / 2);
const GEN_AHEAD = 20;  // lanes generated ahead of player
const DEL_BEHIND = 8;  // lanes removed behind player

const LANE_TYPES = {
  GRASS: 'GRASS',
  ROAD: 'ROAD',
  WATER: 'WATER',
  SAFE: 'SAFE',
};

const COLORS = {
  grass1: 0x5aad3f,
  grass2: 0x4e9936,
  road:   0x4a4a5a,
  road2:  0x3e3e4e,
  water:  0x2a7be4,
  water2: 0x1f6dd4,
  log:    0x8B5E3C,
  log2:   0x7a5030,
  car1:   [0xe74c3c, 0x3498db, 0xf39c12, 0x9b59b6, 0x1abc9c, 0xe67e22],
  sidewalk: 0x9b9b9b,
  lily: 0x3a8a2a,
  trunk: 0x5c3a1e,
  leaf:  0x2d8a1a,
};

// ─── SCENE SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87ceeb, 0.035);
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(8, 16, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -20;
sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -20;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xc8e0ff, 0.3);
fill.position.set(-6, 4, -4);
scene.add(fill);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function rng(min, max) { return min + Math.random() * (max - min); }
function rngInt(min, max) { return Math.floor(rng(min, max + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Geometry cache
const geoCache = {};
function box(w, h, d) {
  const k = `${w},${h},${d}`;
  if (!geoCache[k]) geoCache[k] = new THREE.BoxGeometry(w, h, d);
  return geoCache[k];
}

function makeMesh(geo, color, options = {}) {
  const mat = new THREE.MeshLambertMaterial({ color, ...options });
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = options.castShadow !== false;
  m.receiveShadow = options.receiveShadow !== false;
  return m;
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
class Player {
  constructor() {
    this.group = new THREE.Group();
    this.buildChicken();
    scene.add(this.group);

    this.row = 0;
    this.col = 0;
    this.targetRow = 0;
    this.targetCol = 0;

    this.hopping = false;
    this.hopProgress = 0;
    this.hopFrom = new THREE.Vector3();
    this.hopTo = new THREE.Vector3();
    this.hopDir = new THREE.Vector3();

    this.dead = false;
    this.deathTimer = 0;
  }

  buildChicken() {
    // Body
    const body = makeMesh(box(0.62, 0.62, 0.62), 0xffffff);
    body.position.y = 0.31;
    this.group.add(body);
    this.body = body;

    // Head
    const head = makeMesh(box(0.46, 0.42, 0.46), 0xffffff);
    head.position.set(0, 0.85, 0.12);
    this.group.add(head);
    this.head = head;

    // Beak
    const beak = makeMesh(box(0.12, 0.09, 0.2), 0xFFB347);
    beak.position.set(0, 0.82, 0.42);
    this.group.add(beak);

    // Comb
    const comb = makeMesh(box(0.08, 0.18, 0.08), 0xe74c3c);
    comb.position.set(0, 1.1, 0.05);
    this.group.add(comb);

    // Eyes
    [-0.14, 0.14].forEach(x => {
      const eye = makeMesh(box(0.07, 0.07, 0.04), 0x222222);
      eye.position.set(x, 0.9, 0.36);
      this.group.add(eye);
    });

    // Wings
    [-1, 1].forEach(side => {
      const wing = makeMesh(box(0.16, 0.34, 0.5), 0xdddddd);
      wing.position.set(side * 0.39, 0.38, 0);
      this.group.add(wing);
    });

    // Legs
    [-0.14, 0.14].forEach(x => {
      const leg = makeMesh(box(0.08, 0.22, 0.08), 0xFFB347);
      leg.position.set(x, 0.09, 0);
      this.group.add(leg);
    });

    this.group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  }

  getWorldPos(row, col) {
    return new THREE.Vector3(col * TILE, 0, -row * TILE);
  }

  startHop(dr, dc) {
    if (this.hopping) return false;
    const nr = this.targetRow + dr;
    const nc = this.targetCol + dc;
    if (nc < -HALF || nc > HALF) return false;
    this.hopFrom.copy(this.getWorldPos(this.targetRow, this.targetCol));
    this.hopTo.copy(this.getWorldPos(nr, nc));
    this.hopDir.set(dc, 0, -dr);
    this.targetRow = nr;
    this.targetCol = nc;
    this.hopping = true;
    this.hopProgress = 0;
    if (dr !== 0 || dc !== 0) {
      // Row increases = world -Z = forward. Col increases = world +X = right.
      // atan2(x, z) gives Y rotation where 0 = facing +Z, so negate Z component.
      this.group.rotation.y = Math.atan2(dc, -dr);
    }
    return true;
  }

  update(dt) {
    if (this.dead) {
      this.deathTimer += dt;
      this.group.rotation.z += dt * 5;
      this.group.position.y = Math.max(0, this.group.position.y - dt * 3);
      return;
    }

    if (this.hopping) {
      this.hopProgress = Math.min(1, this.hopProgress + dt * 9);
      const t = this.hopProgress;
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      this.group.position.lerpVectors(this.hopFrom, this.hopTo, ease);
      const arc = Math.sin(t * Math.PI) * 0.55;
      this.group.position.y = arc;

      // Leg animation
      const legSwing = Math.sin(t * Math.PI * 2) * 0.15;
      this.group.children.forEach((c, i) => {
        if (i >= this.group.children.length - 2) {
          c.position.y = 0.09 + (i % 2 === 0 ? legSwing : -legSwing);
        }
      });

      if (t >= 1) {
        this.hopping = false;
        this.row = this.targetRow;
        this.col = this.targetCol;
        this.group.position.copy(this.hopTo);
        this.group.position.y = 0;
      }
    }
  }

  die() {
    if (!this.dead) {
      this.dead = true;
      this.deathTimer = 0;
    }
  }

  reset() {
    this.row = 0; this.col = 0;
    this.targetRow = 0; this.targetCol = 0;
    this.hopping = false;
    this.hopProgress = 0;
    this.dead = false;
    this.deathTimer = 0;
    this.group.position.set(0, 0, 0);
    this.group.rotation.set(0, 0, 0);
  }
}

// ─── LANE GENERATION ─────────────────────────────────────────────────────────
class Lane {
  constructor(row, type) {
    this.row = row;
    this.type = type;
    this.group = new THREE.Group();
    this.group.position.z = -row * TILE;
    this.movers = []; // { mesh, speed, x, width, dir, y }
    scene.add(this.group);
    this.build();
  }

  build() {
    switch (this.type) {
      case LANE_TYPES.GRASS:   this.buildGrass(); break;
      case LANE_TYPES.ROAD:    this.buildRoad(); break;
      case LANE_TYPES.WATER:   this.buildWater(); break;
      case LANE_TYPES.SAFE:    this.buildSafe(); break;
    }
  }

  buildGrass() {
    const alt = this.row % 2 === 0;
    const ground = makeMesh(box(COLS * TILE, 0.18, TILE), alt ? COLORS.grass1 : COLORS.grass2, { castShadow: false });
    ground.position.y = -0.09;
    ground.receiveShadow = true;
    this.group.add(ground);

    // Rocks and bushes
    const count = rngInt(0, 2);
    const usedCols = new Set();
    for (let i = 0; i < count; i++) {
      let c;
      do { c = rngInt(-HALF, HALF); } while (usedCols.has(c));
      usedCols.add(c);
      if (Math.random() < 0.5) this.addBush(c);
      else this.addRock(c);
    }
  }

  addBush(col) {
    const g = new THREE.Group();
    const trunk = makeMesh(box(0.12, 0.22, 0.12), COLORS.trunk);
    trunk.position.y = 0.11;
    g.add(trunk);
    [[0,0.62,0],[0.16,0.44,0],[-0.16,0.44,0],[0,0.44,0.16],[0,0.44,-0.16]].forEach(([x,y,z]) => {
      const leaf = makeMesh(box(0.34, 0.34, 0.34), COLORS.leaf);
      leaf.position.set(x, y, z);
      g.add(leaf);
    });
    g.position.set(col * TILE, 0, 0);
    g.rotation.y = rng(0, Math.PI * 2);
    this.group.add(g);
  }

  addRock(col) {
    const rock = makeMesh(box(0.38, 0.26, 0.38), 0x888899);
    rock.position.set(col * TILE, 0.13, 0);
    rock.rotation.y = rng(0, Math.PI * 2);
    this.group.add(rock);
  }

  buildRoad() {
    const alt = this.row % 2 === 0;
    const ground = makeMesh(box(COLS * TILE, 0.16, TILE), alt ? COLORS.road : COLORS.road2, { castShadow: false });
    ground.position.y = -0.08;
    ground.receiveShadow = true;
    this.group.add(ground);

    // Lane markings
    for (let c = -HALF + 1; c <= HALF - 1; c += 2) {
      const mark = makeMesh(box(0.18, 0.01, 0.6), 0xffffff, { castShadow: false, receiveShadow: false });
      mark.position.set(c * TILE, 0.001, 0);
      this.group.add(mark);
    }

    // Cars
    const dir = Math.random() < 0.5 ? 1 : -1;
    const speed = rng(2.5, 6) * dir;
    const carCount = rngInt(1, 4);
    const spacing = (COLS * TILE) / carCount;
    for (let i = 0; i < carCount; i++) {
      const startX = (i * spacing) + rng(-spacing * 0.3, spacing * 0.3);
      const clampedX = Math.max(-COLS * TILE * 0.5, Math.min(COLS * TILE * 0.5, startX));
      this.addCar(clampedX, speed);
    }
  }

  addCar(startX, speed) {
    const color = pick(COLORS.car1);
    const w = rng(0.9, 1.4);
    const g = new THREE.Group();

    // Body
    const carBody = makeMesh(box(w, 0.36, 0.72), color);
    carBody.position.y = 0.28;
    g.add(carBody);

    // Roof
    const roof = makeMesh(box(w * 0.7, 0.28, 0.56), color);
    roof.position.y = 0.62;
    g.add(roof);

    // Windows
    const wc = 0xaaddff;
    const wf = makeMesh(box(w * 0.55, 0.18, 0.04), wc, { castShadow: false });
    wf.position.set(0, 0.65, 0.3);
    g.add(wf);
    const wr = makeMesh(box(w * 0.55, 0.18, 0.04), wc, { castShadow: false });
    wr.position.set(0, 0.65, -0.3);
    g.add(wr);

    // Wheels
    [[-w * 0.4, 0.26, 0.34],[w * 0.4, 0.26, 0.34],[-w * 0.4, 0.26, -0.34],[w * 0.4, 0.26, -0.34]].forEach(([x, y, z]) => {
      const wheel = makeMesh(box(0.18, 0.18, 0.18), 0x222222);
      wheel.position.set(x, y, z);
      g.add(wheel);
    });

    // Headlights
    [[w * 0.4, 0.28, 0.4],[-w * 0.4, 0.28, 0.4]].forEach(([x, y, z]) => {
      const hl = makeMesh(box(0.12, 0.1, 0.04), 0xffff88, { castShadow: false });
      hl.position.set(x, y, z);
      g.add(hl);
    });

    g.position.set(startX, 0, 0);
    g.rotation.y = speed > 0 ? -Math.PI / 2 : Math.PI / 2;
    g.traverse(c => { if (c.isMesh) c.castShadow = true; });
    this.group.add(g);
    this.movers.push({ mesh: g, speed, x: startX, width: w * 0.5 + 0.2 });
  }

  buildWater() {
    const alt = this.row % 2 === 0;
    const water = makeMesh(box(COLS * TILE, 0.2, TILE), alt ? COLORS.water : COLORS.water2, { castShadow: false });
    water.position.y = -0.1;
    water.receiveShadow = true;
    this.group.add(water);

    // Logs
    const dir = Math.random() < 0.5 ? 1 : -1;
    const speed = rng(1.2, 3.0) * dir;
    const logCount = rngInt(2, 4);
    const spacing = (COLS * TILE) / logCount;
    for (let i = 0; i < logCount; i++) {
      const startX = i * spacing + rng(-0.3, 0.3);
      this.addLog(startX, speed);
    }
  }

  addLog(startX, speed) {
    const len = rng(1.2, 2.8);
    const g = new THREE.Group();
    const log = makeMesh(box(len, 0.28, 0.7), COLORS.log);
    log.position.y = 0.14;
    g.add(log);

    // Log rings
    [-len * 0.4, 0, len * 0.4].forEach(x => {
      const ring = makeMesh(box(0.1, 0.3, 0.72), COLORS.log2);
      ring.position.set(x, 0.14, 0);
      g.add(ring);
    });

    g.position.set(startX, 0, 0);
    g.traverse(c => { if (c.isMesh) c.castShadow = true; });
    this.group.add(g);
    this.movers.push({ mesh: g, speed, x: startX, width: len * 0.5 - 0.1, isLog: true });
  }

  buildSafe() {
    const ground = makeMesh(box(COLS * TILE, 0.16, TILE), COLORS.sidewalk, { castShadow: false });
    ground.position.y = -0.08;
    ground.receiveShadow = true;
    this.group.add(ground);

    // Striped markings on start lane
    for (let c = -HALF; c <= HALF; c++) {
      if (Math.abs(c) % 2 === 0) {
        const stripe = makeMesh(box(TILE * 0.9, 0.01, TILE * 0.9), 0xaaaaaa, { castShadow: false });
        stripe.position.set(c * TILE, 0.001, 0);
        this.group.add(stripe);
      }
    }
  }

  update(dt) {
    const halfWorld = COLS * TILE * 0.5 + 2;
    this.movers.forEach(m => {
      m.x += m.speed * dt;
      if (m.x > halfWorld) m.x -= COLS * TILE + 3;
      if (m.x < -halfWorld) m.x += COLS * TILE + 3;
      m.mesh.position.x = m.x;
    });
  }

  dispose() {
    scene.remove(this.group);
    this.group.traverse(c => {
      if (c.isMesh) { c.geometry.dispose(); c.material.dispose(); }
    });
  }
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let lanes = new Map();
let player, score, bestScore = 0, gameState = 'menu';
let cameraY = 14, cameraZ = 10;
const camTarget = new THREE.Vector3();

const scoreEl = document.getElementById('score-display');
const bestEl = document.getElementById('best-display');
const overlay = document.getElementById('overlay');
const deathScore = document.getElementById('death-score');
const deathBest = document.getElementById('death-best');
const startBtn = document.getElementById('start-btn');

function ensureLanes(from, to) {
  for (let r = from; r <= to; r++) {
    if (!lanes.has(r)) {
      let type;
      if (r === 0) { type = LANE_TYPES.SAFE; }
      else if (r > 0) {
        const streak = r % 7;
        if (streak < 2) type = LANE_TYPES.GRASS;
        else if (streak < 4) type = LANE_TYPES.ROAD;
        else if (streak === 4) type = LANE_TYPES.WATER;
        else type = LANE_TYPES.GRASS;
        // Randomize a bit
        if (r > 3) {
          const roll = Math.random();
          if (roll < 0.32) type = LANE_TYPES.GRASS;
          else if (roll < 0.58) type = LANE_TYPES.ROAD;
          else if (roll < 0.76) type = LANE_TYPES.WATER;
          else type = LANE_TYPES.GRASS;
        }
      } else {
        type = LANE_TYPES.GRASS;
      }
      lanes.set(r, new Lane(r, type));
    }
  }
}

function pruneLanes(behindRow) {
  lanes.forEach((lane, r) => {
    if (r < behindRow) {
      lane.dispose();
      lanes.delete(r);
    }
  });
}

function initGame() {
  // Clear
  lanes.forEach(l => l.dispose());
  lanes.clear();

  if (!player) { player = new Player(); }
  else { player.reset(); }

  score = 0;
  scoreEl.textContent = '0';

  ensureLanes(0, GEN_AHEAD);
  gameState = 'playing';
  overlay.classList.add('hidden');
}

function updateScore(row) {
  if (row > score) {
    score = row;
    scoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      bestEl.textContent = `BEST: ${bestScore}`;
    }
  }
}

function checkCollision() {
  const lane = lanes.get(player.row);
  if (!lane) return;

  if (lane.type === LANE_TYPES.ROAD) {
    const px = player.group.position.x;
    lane.movers.forEach(m => {
      const dx = Math.abs(px - m.x);
      if (dx < m.width + 0.38) {
        triggerDeath('squashed');
      }
    });
  }

  if (lane.type === LANE_TYPES.WATER && !player.hopping) {
    const px = player.group.position.x;
    let onLog = false;
    lane.movers.forEach(m => {
      const dx = Math.abs(px - m.x);
      if (dx < m.width) onLog = true;
    });
    if (!onLog) triggerDeath('drowned');
  }
}

function rideLog() {
  const lane = lanes.get(player.row);
  if (!lane || lane.type !== LANE_TYPES.WATER || player.hopping || player.dead) return;
  const px = player.group.position.x;
  lane.movers.forEach(m => {
    const dx = Math.abs(px - m.x);
    if (dx < m.width) {
      const newX = player.group.position.x + m.speed * (1 / 60);
      if (newX >= -HALF * TILE && newX <= HALF * TILE) {
        player.group.position.x = newX;
        player.col = Math.round(newX / TILE);
        player.targetCol = player.col;
      }
    }
  });
}

function triggerDeath(cause) {
  if (player.dead || gameState !== 'playing') return;
  player.die();
  gameState = 'dead';
  setTimeout(() => showDeathScreen(), 900);
}

function showDeathScreen() {
  deathScore.style.display = 'block';
  deathScore.textContent = `YOU REACHED ${score}`;
  if (score >= bestScore && score > 0) {
    deathBest.style.display = 'block';
    deathBest.textContent = score === bestScore && score > 0 ? '🏆 NEW BEST!' : '';
  } else {
    deathBest.style.display = 'none';
  }
  startBtn.textContent = 'TRY AGAIN';
  overlay.classList.remove('hidden');
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (gameState !== 'playing') return;
  if (['ArrowUp','KeyW'].includes(e.code)) { e.preventDefault(); player.startHop(1, 0); }
  if (['ArrowDown','KeyS'].includes(e.code)) { e.preventDefault(); player.startHop(-1, 0); }
  if (['ArrowLeft','KeyA'].includes(e.code)) { e.preventDefault(); player.startHop(0, -1); }
  if (['ArrowRight','KeyD'].includes(e.code)) { e.preventDefault(); player.startHop(0, 1); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch
document.getElementById('tz-up').addEventListener('touchstart', e => { e.preventDefault(); if (gameState === 'playing') player.startHop(1, 0); }, { passive: false });
document.getElementById('tz-down').addEventListener('touchstart', e => { e.preventDefault(); if (gameState === 'playing') player.startHop(-1, 0); }, { passive: false });
document.getElementById('tz-left').addEventListener('touchstart', e => { e.preventDefault(); if (gameState === 'playing') player.startHop(0, -1); }, { passive: false });
document.getElementById('tz-right').addEventListener('touchstart', e => { e.preventDefault(); if (gameState === 'playing') player.startHop(0, 1); }, { passive: false });

// Swipe
let touchStartX, touchStartY;
window.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', e => {
  if (gameState !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { player.startHop(1, 0); return; }
  if (Math.abs(dx) > Math.abs(dy)) {
    dx > 0 ? player.startHop(0, 1) : player.startHop(0, -1);
  } else {
    dy < 0 ? player.startHop(1, 0) : player.startHop(-1, 0);
  }
}, { passive: true });

startBtn.addEventListener('click', initGame);

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
let last = 0;
const FIXED_DT = 1 / 60;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  if (gameState === 'playing' || gameState === 'dead') {
    player.update(dt);

    if (gameState === 'playing') {
      rideLog();
      updateScore(player.row);
      ensureLanes(player.row - DEL_BEHIND, player.row + GEN_AHEAD);
      pruneLanes(player.row - DEL_BEHIND);
      checkCollision();
    }

    lanes.forEach(l => l.update(dt));

    // Camera follow
    // Forward = increasing row = decreasing world Z.
    // Camera sits BEHIND player = higher Z than player. Looks TOWARD lower Z (ahead).
    const pr = player.hopping ? player.targetRow : player.row;
    const playerWorldZ = -pr * TILE;
    camTarget.set(0, cameraY, playerWorldZ + cameraZ); // behind = +Z from player
    camera.position.lerp(camTarget, 0.08);
    // Look at a point slightly ahead of the player (lower Z = further forward)
    camera.lookAt(player.group.position.x * 0.15, 0, playerWorldZ - 2);

    // Sun follows
    sun.position.set(
      camera.position.x + 8,
      camera.position.y + 8,
      camera.position.z - 4
    );
    sun.target.position.set(0, 0, playerWorldZ);
    sun.target.updateMatrixWorld();
  }

  renderer.render(scene, camera);
}

// Kick off
camera.position.set(0, cameraY, cameraZ);
camera.lookAt(0, 0, -2); // look ahead (forward = -Z)
ensureLanes(-2, GEN_AHEAD);
requestAnimationFrame(loop);
</script>
