<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossy Road - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="instructions">Use Arrow Keys or WASD to move</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Game Constants
        const LANE_WIDTH = 4;
        const GRID_SIZE = 20;
        const OBSTACLE_SPEED = 0.1;
        const PLAYER_SPEED = 0.15;

        let scene, camera, renderer, player;
        let obstacles = [];
        let score = 0;
        let gameActive = true;
        const keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue
            scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 10);
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const sunLight = new THREE.DirectionalLight(0xffffff, 1);
            sunLight.position.set(5, 10, 7.5);
            scene.add(sunLight);

            // Ground / Road
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3e8e41 }); // Grass green
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Road lanes
            for (let i = -50; i < 50; i += LANE_WIDTH) {
                const roadGeo = new THREE.PlaneGeometry(100, LANE_WIDTH);
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 }); // Asphalt
                const road = new THREE.Mesh(roadGeo, roadMat);
                road.rotation.x = -Math.PI / 2;
                road.position.z = -i;
                scene.add(road);

                // Lane markings
                if (i % (LANE_WIDTH * 2) === 0) {
                    const lineGeo = new THREE.PlaneGeometry(100, 0.2);
                    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    const line = new THREE.Mesh(lineGeo, lineMat);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(0, 0.01, -i);
                    scene.add(line);
                }
            }

            // Player (a chicken-like cube)
            const playerGeo = new THREE.BoxGeometry(1, 1, 1);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0xffcc00 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0.5, 0);
            scene.add(player);

            // Obstacles (cars)
            createObstacles();

            window.addEventListener('keydown', (e) => keys[e.key] = true);
            window.addEventListener('keyup', (e) => keys[e.key] = false);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createObstacles() {
            const colors = [0xff0000, 0x0000ff, 0xffff00, 0xffffff];
            for (let i = 0; i < 40; i++) {
                const obsGeo = new THREE.BoxGeometry(2, 1.5, 1);
                const obsMat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const obstacle = new THREE.Mesh(obsGeo, obsMat);
                
                // Random lane and position
                const lane = Math.floor(Math.random() * 20) * LANE_WIDTH;
                obstacle.position.set(
                    (Math.random() - 0.5) * 40,
                    0.75,
                    -Math.random() * 100 - 20
                );
                
                // Assign a direction and speed to the obstacle
                obstacle.userData = {
                    speed: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.1 + 0.05),
                    lane: lane
                };
                
                obstacles.push(obstacle);
                scene.add(obstacle);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // Player Movement
            if ((keys['ArrowLeft'] || keys['a']) && player.position.x > -10) player.position.x -= 0.1;
            if ((keys['ArrowRight'] || keys['d']) && player.position.x < 10) player.position.x += 0.1;
            
            // Automatic forward movement
            player.position.z -= PLAYER_SPEED;
            
            // Update Score
            score = Math.floor(Math.abs(player.position.z));
            document.getElementById('score').innerText = score;

            // Obstacle Movement and Collision
            obstacles.forEach(obs => {
                obs.position.x += obs.userData.speed;
                
                // Wrap around or reset if out of bounds
                if (obs.position.x > 50) obs.position.x = -50;
                if (obs.position.x < -50) obs.position.x = 50;

                // Collision Detection
                const dx = player.position.x - obs.position.x;
                const dz = player.position.z - obs.position.z;
                if (Math.abs(dx) < 1.2 && Math.abs(dz) < 1.2) {
                    gameActive = false;
                    alert("Game Over! Score: " + score);
                    location.reload();
                }
            });

            // Camera follows player slightly
            camera.position.z += 0.05; // Slow drift forward or just keep it fixed relative to world
            // Actually, let's make camera follow the z-axis of the player
            camera.position.z = player.position.z + 10;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
