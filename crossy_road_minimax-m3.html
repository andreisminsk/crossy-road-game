<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossy Road — Three.js</title>
<style>
  :root {
    --sky-1: #b8e4ff;
    --sky-2: #f4f8d0;
    --hud-bg: rgba(20, 30, 40, 0.55);
    --accent: #ffd23f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: linear-gradient(to bottom, var(--sky-1), var(--sky-2));
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: white; user-select: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #hud {
    position: absolute; top: 16px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .panel {
    background: var(--hud-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 10px 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    pointer-events: auto;
  }
  #score { font-size: 34px; font-weight: 800; letter-spacing: 1px; line-height: 1; }
  #score small { display:block; font-size: 11px; font-weight: 500; opacity: 0.75; letter-spacing: 2px; margin-bottom: 2px; }
  #best { font-size: 14px; opacity: 0.9; margin-top: 4px; }
  #best b { color: var(--accent); }

  #controls { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25);
    color: white; font-size: 20px; font-weight: 700; cursor: pointer;
    display: grid; place-items: center; transition: transform 0.08s, background 0.15s;
  }
  .btn:active { transform: scale(0.92); background: rgba(255,255,255,0.3); }
  .row { display: flex; gap: 8px; }
  #pauseBtn { font-size: 16px; width: auto; padding: 0 14px; }

  #tip {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--hud-bg); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18); border-radius: 20px;
    padding: 8px 18px; font-size: 14px; opacity: 0.95;
    pointer-events: none; z-index: 10;
    transition: opacity 0.4s;
  }

  #overlay {
    position: absolute; inset: 0; display: grid; place-items: center;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.4), rgba(0,0,0,0.75));
    z-index: 20; transition: opacity 0.35s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .card {
    background: rgba(25, 35, 50, 0.85); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 22px; padding: 36px 44px; text-align: center;
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
    max-width: 380px;
  }
  .card h1 { margin: 0 0 8px; font-size: 42px; letter-spacing: 2px; }
  .card p { margin: 6px 0; opacity: 0.85; }
  .card .big { font-size: 64px; font-weight: 800; color: var(--accent); margin: 14px 0; line-height: 1; }
  .card button {
    margin-top: 16px; background: var(--accent); color: #1a1a1a;
    border: none; border-radius: 12px; padding: 12px 28px;
    font-size: 18px; font-weight: 800; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 6px 0 #c79a00; transition: transform 0.08s, box-shadow 0.08s;
  }
  .card button:active { transform: translateY(3px); box-shadow: 0 3px 0 #c79a00; }
  .keys { display: flex; justify-content: center; gap: 6px; margin: 12px 0 4px; flex-wrap: wrap; }
  .keys span {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; padding: 4px 9px; font-size: 12px; font-family: monospace;
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <div class="panel">
    <div id="score"><small>SCORE</small>0</div>
    <div id="best">BEST <b id="bestVal">0</b></div>
  </div>
  <div id="controls">
    <button class="btn" id="pauseBtn" aria-label="Pause">❚❚</button>
    <div class="row"><button class="btn" data-dir="left">◀</button><button class="btn" data-dir="right">▶</button></div>
    <div class="row"><button class="btn" data-dir="fwd">▲</button><button class="btn" data-dir="back">▼</button></div>
  </div>
</div>

<div id="tip">Arrow keys / WASD to hop — Space to pause</div>

<div id="overlay">
  <div class="card" id="card">
    <h1>CROSSY ROAD</h1>
    <p>Hop as far as you can.</p>
    <p>Avoid cars, ride logs, and don't fall in the river!</p>
    <div class="keys">
      <span>↑ W</span><span>↓ S</span><span>← A</span><span>→ D</span><span>Space</span>
    </div>
    <button id="startBtn">PLAY</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
//  CROSSY ROAD — single-file three.js implementation
//  - Tile-based world (grass / road / water / rail)
//  - Smooth hop animation, camera follow with damping
//  - Vehicles, trains, logs with proper collision
//  - Particle hops, score, best score (localStorage)
//  - Mobile-friendly on-screen controls
// ============================================================

// ---------- Constants ----------
const TILE = 1;
const ROWS_AHEAD = 24;
const ROWS_BEHIND = 6;
const HOP_DURATION = 130;     // ms per hop
const CAM_LERP = 0.12;
// Rotated 180°: camera sits BEHIND player (at -z), looking forward (+z).
// Up arrow hops the chicken AWAY from the camera.
const CAM_OFFSET = new THREE.Vector3(0, 8, -5.5);
const CAM_LOOK_OFFSET = new THREE.Vector3(0, 0.5, 2);

// ---------- Renderer / Scene / Camera ----------
const container = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xdceeff, 22, 55);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, -5);
camera.lookAt(0, 0, 0);

// ---------- Sky gradient ----------
{
  const skyGeo = new THREE.SphereGeometry(80, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:    { value: new THREE.Color(0x6cc6ff) },
      bottomColor: { value: new THREE.Color(0xfff5d6) },
      offset:      { value: 5 },
      exponent:    { value: 0.6 },
    },
    vertexShader: `
      varying vec3 vWorld;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }`,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float offset;
      uniform float exponent;
      varying vec3 vWorld;
      void main() {
        float h = normalize(vWorld + vec3(0.0, offset, 0.0)).y;
        float t = max(pow(max(h, 0.0), exponent), 0.0);
        gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
      }`,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
}

// ---------- Lights ----------
const hemi = new THREE.HemisphereLight(0xffffff, 0x4a6b3a, 0.85);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff4d6, 1.2);
sun.position.set(8, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -12;
sun.shadow.camera.right = 12;
sun.shadow.camera.top = 12;
sun.shadow.camera.bottom = -12;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 40;
sun.shadow.bias = -0.0008;
scene.add(sun);

// ---------- Shared geometry / materials ----------
const tileGeo = new THREE.BoxGeometry(TILE, 0.4, TILE);
const tileMatGrass = new THREE.MeshStandardMaterial({ color: 0x7ec850, roughness: 0.95, metalness: 0 });
const tileMatGrassDark = new THREE.MeshStandardMaterial({ color: 0x6cba45, roughness: 0.95, metalness: 0 });
const tileMatRoad = new THREE.MeshStandardMaterial({ color: 0x3a3a40, roughness: 0.9, metalness: 0 });
const tileMatWater = new THREE.MeshStandardMaterial({ color: 0x4fb3e8, roughness: 0.25, metalness: 0.1, transparent: true, opacity: 0.85 });
const tileMatRail = new THREE.MeshStandardMaterial({ color: 0x6e533c, roughness: 0.85, metalness: 0 });

// Trees / decorations
const trunkGeo = new THREE.CylinderGeometry(0.12, 0.16, 0.5, 8);
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6a3a1f, roughness: 0.9 });
const leafGeo = new THREE.ConeGeometry(0.38, 0.8, 8);
const leafMatLight = new THREE.MeshStandardMaterial({ color: 0x3fa650, roughness: 0.85 });
const leafMatDark = new THREE.MeshStandardMaterial({ color: 0x2e8a45, roughness: 0.85 });

// Lilypad
const padGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.08, 16);
const padMat = new THREE.MeshStandardMaterial({ color: 0x4ea84a, roughness: 0.6 });

// Vehicle base
const carBodyGeo = new THREE.BoxGeometry(0.7, 0.35, 0.4);
const carCabinGeo = new THREE.BoxGeometry(0.45, 0.22, 0.34);
const wheelGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.08, 12);
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });

// Train
const trainBodyGeo = new THREE.BoxGeometry(2.6, 0.6, 0.5);
const trainCabGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);

// Log
const logGeo = new THREE.CylinderGeometry(0.48, 0.48, 2.2, 14);
const logMat = new THREE.MeshStandardMaterial({ color: 0x7a4a23, roughness: 0.85 });

// ---------- Player (chicken) ----------
function makeChicken() {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.65 });
  const beakMat = new THREE.MeshStandardMaterial({ color: 0xff9a1f, roughness: 0.6 });
  const combMat = new THREE.MeshStandardMaterial({ color: 0xe83a3a, roughness: 0.6 });
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.42, 0.42), bodyMat);
  body.position.y = 0.32; body.castShadow = true;
  g.add(body);

  const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.28, 0.28), bodyMat);
  head.position.set(0, 0.6, 0.05); head.castShadow = true;
  g.add(head);

  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.14, 6), beakMat);
  beak.rotation.x = Math.PI / 2;
  beak.position.set(0, 0.58, 0.25);
  g.add(beak);

  const comb = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.16), combMat);
  comb.position.set(0, 0.78, 0.02);
  g.add(comb);

  const wattle = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.04), combMat);
  wattle.position.set(0, 0.48, 0.22);
  g.add(wattle);

  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), eyeMat);
  eyeL.position.set(-0.08, 0.66, 0.18);
  g.add(eyeL);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.08; g.add(eyeR);

  // tiny feet
  const footMat = new THREE.MeshStandardMaterial({ color: 0xff9a1f });
  const footL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.16), footMat);
  footL.position.set(-0.1, 0.02, 0.04); g.add(footL);
  const footR = footL.clone(); footR.position.x = 0.1; g.add(footR);

  // wings (tucked)
  const wingMat = new THREE.MeshStandardMaterial({ color: 0xf3f3f3 });
  const wingL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.28, 0.28), wingMat);
  wingL.position.set(-0.29, 0.34, 0); g.add(wingL);
  const wingR = wingL.clone(); wingR.position.x = 0.29; g.add(wingR);

  // Shadow caster group
  g.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = false; } });
  return g;
}

// ---------- Particles ----------
const particlePool = [];
const particleGeo = new THREE.SphereGeometry(0.06, 6, 6);
function spawnPoof(pos, color = 0xffffff) {
  for (let i = 0; i < 5; i++) {
    let p = particlePool.pop();
    if (!p) {
      p = new THREE.Mesh(particleGeo, new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 }));
      p.userData = { vx: 0, vy: 0, vz: 0, life: 0, max: 0 };
      scene.add(p);
    }
    p.material.color.setHex(color);
    p.material.opacity = 1;
    p.position.copy(pos);
    p.position.y = 0.2;
    const ang = Math.random() * Math.PI * 2;
    const sp = 1.2 + Math.random() * 1.5;
    p.userData.vx = Math.cos(ang) * sp * 0.6;
    p.userData.vz = Math.sin(ang) * sp * 0.6;
    p.userData.vy = 2 + Math.random() * 1.2;
    p.userData.life = 0;
    p.userData.max = 0.6;
    p.scale.setScalar(0.6 + Math.random() * 0.6);
    scene.add(p);
    activeParticles.push(p);
  }
}
const activeParticles = [];

function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.userData.life += dt;
    if (p.userData.life >= p.userData.max) {
      scene.remove(p);
      activeParticles.splice(i, 1);
      particlePool.push(p);
      continue;
    }
    p.userData.vy -= 6 * dt;
    p.position.x += p.userData.vx * dt;
    p.position.y += p.userData.vy * dt;
    p.position.z += p.userData.vz * dt;
    p.material.opacity = 1 - (p.userData.life / p.userData.max);
  }
}

// ---------- Row types ----------
// grass: walkable, may have trees blocking some cells
// road: vehicles travel along x at given speed, lane direction = sign(speed)
// rail: trains occasionally
// water: logs/lilypads float along x; player must ride them

const TYPE = { GRASS: 0, ROAD: 1, WATER: 2, RAIL: 3 };

function rand(min, max) { return Math.random() * (max - min) + min; }
function randi(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Build a row at world z = zIndex (zIndex 0 = starting row, increases forward)
function generateRow(zIndex) {
  const row = {
    z: zIndex,
    type: TYPE.GRASS,
    tiles: [],          // visual tiles (only some)
    obstacles: new Map(), // x -> 'tree' | 'lilypad'
    vehicles: [],
    logs: [],
    trains: [],
    trainTimer: 0,
    nextTrainIn: 3 + Math.random() * 4,
    speed: 0,
    dir: 0,             // -1 or +1 for road/water
    isStart: zIndex <= 0,
  };

  if (row.isStart) {
    // starting safe grass row
    row.type = TYPE.GRASS;
    // no obstacles on starting row's center, ensure spawn is clear
  } else if (zIndex < 3) {
    // guaranteed grass early
    row.type = TYPE.GRASS;
  } else {
    // Weighted random. Avoid 3+ same-type in a row to keep variety.
    const lastTypes = rowMemory.slice(-3);
    const same = lastTypes.filter(t => t === lastTypes[lastTypes.length - 1]).length;
    let roll = Math.random();
    if (same >= 2) {
      // force a different type
      const forced = lastTypes[lastTypes.length - 1];
      const opts = [TYPE.GRASS, TYPE.ROAD, TYPE.WATER, TYPE.RAIL].filter(t => t !== forced);
      row.type = pick(opts);
    } else {
      if (roll < 0.45) row.type = TYPE.GRASS;
      else if (roll < 0.75) row.type = TYPE.ROAD;
      else if (roll < 0.92) row.type = TYPE.WATER;
      else row.type = TYPE.RAIL;
    }
  }

  // Populate row
  if (row.type === TYPE.GRASS) {
    // add some tree obstacles (skip center column on early rows to be friendly)
    const numTrees = randi(0, 3);
    for (let i = 0; i < numTrees; i++) {
      const x = randi(-5, 5);
      if (zIndex <= 2 && x === 0) continue; // keep starting area clear
      row.obstacles.set(x, 'tree');
    }
  } else if (row.type === TYPE.ROAD) {
    row.dir = Math.random() < 0.5 ? -1 : 1;
    row.speed = rand(2.5, 5.5) * row.dir;
    // vehicles spawned externally by manager
  } else if (row.type === TYPE.WATER) {
    row.dir = Math.random() < 0.5 ? -1 : 1;
    // Slower water so the player has time to time the hop onto a log.
    row.speed = rand(0.8, 1.6) * row.dir;
    row.laneCount = 1;
    // logs spawned externally
  } else if (row.type === TYPE.RAIL) {
    row.dir = Math.random() < 0.5 ? -1 : 1;
    row.speed = 14 * row.dir;
  }

  return row;
}

function buildRowVisuals(row) {
  // ground
  let mat;
  if (row.type === TYPE.GRASS) mat = (row.z % 2 === 0) ? tileMatGrass : tileMatGrassDark;
  else if (row.type === TYPE.ROAD) mat = tileMatRoad;
  else if (row.type === TYPE.WATER) mat = tileMatWater;
  else mat = tileMatRail;

  // single long tile strip across width (visually clean + performant)
  const stripGeo = new THREE.BoxGeometry(14, 0.4, TILE);
  const strip = new THREE.Mesh(stripGeo, mat);
  strip.position.set(0, -0.2, row.z);
  strip.receiveShadow = true;
  scene.add(strip);
  row.stripMesh = strip;

  // road markings
  if (row.type === TYPE.ROAD) {
    const dashMat = new THREE.MeshBasicMaterial({ color: 0xfff3a8 });
    for (let i = -6; i <= 6; i++) {
      const dash = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.02, 0.08), dashMat);
      dash.position.set(i, 0.01, row.z);
      scene.add(dash);
    }
  }
  // rail tracks
  if (row.type === TYPE.RAIL) {
    const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7, roughness: 0.4 });
    const sleeperMat = new THREE.MeshStandardMaterial({ color: 0x4a3522 });
    // two rails
    for (const xOff of [-0.3, 0.3]) {
      const rail = new THREE.Mesh(new THREE.BoxGeometry(14, 0.05, 0.06), railMat);
      rail.position.set(0, 0.005, row.z + xOff);
      scene.add(rail);
    }
    // sleepers
    for (let x = -7; x <= 7; x += 0.7) {
      const s = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.04, 0.9), sleeperMat);
      s.position.set(x, 0.0, row.z);
      scene.add(s);
    }
  }

  // obstacles (trees)
  if (row.type === TYPE.GRASS) {
    for (const [x, kind] of row.obstacles) {
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 0.25;
      tree.add(trunk);
      const leaves = new THREE.Mesh(leafGeo, Math.random() < 0.5 ? leafMatLight : leafMatDark);
      leaves.position.y = 0.9;
      tree.add(leaves);
      tree.position.set(x, 0, row.z);
      tree.traverse(o => { if (o.isMesh) o.castShadow = true; });
      scene.add(tree);
      row.obstacleMeshes = row.obstacleMeshes || [];
      row.obstacleMeshes.push(tree);
    }
  }
}

function disposeRow(row) {
  if (row.stripMesh) scene.remove(row.stripMesh);
  if (row.obstacleMeshes) row.obstacleMeshes.forEach(m => scene.remove(m));
  if (row.vehicleMeshes) row.vehicleMeshes.forEach(m => scene.remove(m));
  if (row.logMeshes) row.logMeshes.forEach(m => scene.remove(m));
  if (row.trainMeshes) row.trainMeshes.forEach(m => scene.remove(m));
  // remove any extra decoration meshes stored on row
  if (row.extraMeshes) row.extraMeshes.forEach(m => scene.remove(m));
}

// ---------- Vehicles ----------
function spawnVehicle(row) {
  const colors = [0xe74c3c, 0x3498db, 0xf1c40f, 0x9b59b6, 0x1abc9c, 0xe67e22, 0xecf0f1, 0x2c3e50];
  const isTruck = Math.random() < 0.3;
  const len = isTruck ? 1.4 : 0.7;
  const color = pick(colors);

  const v = new THREE.Group();
  const body = new THREE.Mesh(carBodyGeo, new THREE.MeshStandardMaterial({ color, roughness: 0.55, metalness: 0.25 }));
  body.scale.set(isTruck ? 1.8 : 1, 1, 1);
  body.position.y = 0.3;
  body.castShadow = true;
  v.add(body);

  const cabin = new THREE.Mesh(carCabinGeo, new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.4, metalness: 0.3 }));
  cabin.position.set(isTruck ? -0.25 : -0.05, 0.3 + 0.22, 0);
  cabin.castShadow = true;
  v.add(cabin);

  for (const wx of [-0.22, 0.22]) {
    for (const wz of [-0.18, 0.18]) {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(wx, 0.09, wz);
      v.add(wheel);
    }
  }
  // headlights
  const lightMat = new THREE.MeshBasicMaterial({ color: 0xfff7c8 });
  const headlight1 = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), lightMat);
  headlight1.position.set(isTruck ? 0.7 : 0.36, 0.32, 0.13);
  v.add(headlight1);
  const headlight2 = headlight1.clone(); headlight2.position.z = -0.13; v.add(headlight2);

  const startX = row.dir > 0 ? -10 - Math.random() * 3 : 10 + Math.random() * 3;
  v.position.set(startX, 0, row.z);
  scene.add(v);

  row.vehicleMeshes = row.vehicleMeshes || [];
  row.vehicleMeshes.push(v);
  row.vehicles.push({
    mesh: v,
    speed: row.speed * rand(0.85, 1.15),
    len: len,
  });
}

// Spawn a log at an explicit x position. Used to seed water rows with one log
// near the center column so the player can always reach a log from any column
// when the row first appears.
function spawnLogAt(row, x) {
  const len = rand(2.0, 3.2);
  const log = new THREE.Mesh(logGeo, logMat);
  log.rotation.z = Math.PI / 2;
  log.scale.set(1, 1, len / 2.2);
  log.position.set(x, 0.1, row.z);
  log.castShadow = true;
  scene.add(log);

  const ringMat = new THREE.MeshStandardMaterial({ color: 0xb98556, roughness: 0.8 });
  for (const sx of [-len/2 + 0.05, len/2 - 0.05]) {
    const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.04, 16), ringMat);
    ring.rotation.z = Math.PI / 2;
    ring.position.set(sx, 0, row.z);
    scene.add(ring);
    row.logMeshes = row.logMeshes || [];
    row.logMeshes.push(ring);
  }

  row.logMeshes = row.logMeshes || [];
  row.logMeshes.push(log);
  row.logs.push({ mesh: log, speed: row.speed * rand(0.85, 1.15), len });
}

function spawnLog(row) {
  const len = rand(1.6, 3.2);
  const log = new THREE.Mesh(logGeo, logMat);
  log.rotation.z = Math.PI / 2;
  log.scale.set(1, 1, len / 2.2);
  // Spawn within the playfield (x ∈ roughly [-9, 9]) and biased toward the
  // upstream edge so logs drift into view naturally. This guarantees at
  // least one log is usually reachable from any column.
  const edgeBias = row.dir > 0 ? -1 : 1;
  const startX = edgeBias * (4 + Math.random() * 5);
  log.position.set(startX, 0.1, row.z);
  log.castShadow = true;
  scene.add(log);

  // small end rings
  const ringMat = new THREE.MeshStandardMaterial({ color: 0xb98556, roughness: 0.8 });
  for (const sx of [-len/2 + 0.05, len/2 - 0.05]) {
    const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.04, 16), ringMat);
    ring.rotation.z = Math.PI / 2;
    ring.position.set(sx, 0, row.z);
    scene.add(ring);
    row.logMeshes = row.logMeshes || [];
    row.logMeshes.push(ring);
  }

  row.logMeshes = row.logMeshes || [];
  row.logMeshes.push(log);
  row.logs.push({ mesh: log, speed: row.speed * rand(0.85, 1.15), len });
}

function spawnTrain(row) {
  const train = new THREE.Group();
  const body = new THREE.Mesh(trainBodyGeo, new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.5, metalness: 0.4 }));
  body.position.y = 0.5; body.castShadow = true;
  train.add(body);
  for (const cx of [-1.0, 1.0]) {
    const cab = new THREE.Mesh(trainCabGeo, new THREE.MeshStandardMaterial({ color: 0x8b2a1f, roughness: 0.5 }));
    cab.position.set(cx, 0.5, 0); cab.castShadow = true;
    train.add(cab);
  }
  // windows
  const winMat = new THREE.MeshStandardMaterial({ color: 0x9bd7ff, emissive: 0x224466, roughness: 0.3 });
  for (const wx of [-0.9, 0.0, 0.9]) {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.14, 0.52), winMat);
    win.position.set(wx, 0.6, 0);
    train.add(win);
  }
  // wheels
  for (const wx of [-1.0, -0.3, 0.3, 1.0]) {
    for (const wz of [-0.28, 0.28]) {
      const w = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.08, 10), wheelMat);
      w.rotation.z = Math.PI / 2;
      w.position.set(wx, 0.12, wz);
      train.add(w);
    }
  }

  const startX = row.dir > 0 ? -18 : 18;
  train.position.set(startX, 0, row.z);
  train.scale.set(1.5, 1, 1);
  scene.add(train);

  row.trainMeshes = row.trainMeshes || [];
  row.trainMeshes.push(train);
  row.trains.push({ mesh: train, speed: row.speed });
}

// ---------- World manager ----------
const rows = new Map(); // zIndex -> row
const rowMemory = [];   // last few types for variety logic

function ensureRow(zIndex) {
  if (rows.has(zIndex)) return rows.get(zIndex);
  const row = generateRow(zIndex);
  buildRowVisuals(row);
  rows.set(zIndex, row);
  rowMemory.push(row.type);
  if (rowMemory.length > 8) rowMemory.shift();

  // pre-populate some vehicles / logs
  if (row.type === TYPE.ROAD) {
    const n = randi(1, 3);
    for (let i = 0; i < n; i++) spawnVehicle(row);
  } else if (row.type === TYPE.WATER) {
    // Seed one log near the center column so the player can always reach a
    // log from any starting x when the row first appears.
    spawnLogAt(row, (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 2));
    const n = randi(1, 2);
    for (let i = 0; i < n; i++) spawnLog(row);
  }
  return row;
}

function pruneRows(maxZ) {
  for (const [z, row] of rows) {
    if (z > maxZ + ROWS_AHEAD || z < maxZ - ROWS_BEHIND - 2) {
      disposeRow(row);
      rows.delete(z);
    }
  }
}

// ---------- Player state ----------
const player = {
  group: makeChicken(),
  gridX: 0,
  gridZ: 0,         // target z row
  displayX: 0,
  displayZ: 0,
  displayY: 0,
  hopping: false,
  hopStart: 0,
  hopFromX: 0, hopFromZ: 0, hopToX: 0, hopToZ: 0,
  onLog: null,      // current log object or null
  onLogOffsetX: 0,  // x offset from log center
  ridingDx: 0,
  facing: 0,        // 0=fwd (+z), PI=back, -PI/2=left, PI/2=right (radians around Y)
  alive: true,
  invuln: 0,
  squash: 0,        // squash animation on hop
};

scene.add(player.group);
player.group.position.set(0, 0, 0);

// Input queue (one hop at a time, but can buffer next)
const inputQueue = [];

function tryHop(dx, dz) {
  if (!player.alive) return;
  if (gameState !== 'playing') return;
  if (player.hopping) {
    inputQueue.push([dx, dz]);
    if (inputQueue.length > 1) inputQueue.shift(); // keep latest only
    return;
  }
  startHop(dx, dz);
}

function startHop(dx, dz) {
  const nx = player.gridX + dx;
  const nz = player.gridZ + dz;
  if (nx < -6 || nx > 6) return; // hard bounds
  // prevent hopping backward off world into nothing for first rows
  if (nz < player.gridZ - 2) return;

  // Check tree obstacle on target
  const targetRow = ensureRow(nz);
  if (targetRow.type === TYPE.GRASS && targetRow.obstacles.has(nx)) return;
  // Water is allowed: if no log is under the target cell, finishHop will
  // call die('water') on landing. This lets the player choose to jump into
  // water and drown rather than silently failing the hop.

  player.hopping = true;
  player.hopStart = performance.now();
  player.hopFromX = player.gridX;
  player.hopFromZ = player.gridZ;
  player.hopToX = nx;
  player.hopToZ = nz;
  player.facing = (dz > 0) ? 0 : (dz < 0) ? Math.PI : (dx > 0) ? Math.PI/2 : -Math.PI/2;
}

function finishHop() {
  // Preserve floating x while riding a log — only snap to integer when on
  // a tile (grass/road/rail). For water, keep the current displayX so the
  // log-riding state (which uses displayX) stays consistent.
  if (player.onLog) {
    // On a log: keep current floating x, just advance z.
    player.gridZ = player.hopToZ;
    player.displayZ = player.gridZ;
    // gridX stays at its current floating value.
  } else {
    player.gridX = player.hopToX;
    player.gridZ = player.hopToZ;
    player.displayX = player.gridX;
    player.displayZ = player.gridZ;
  }

  // Score
  if (player.gridZ > bestZ) {
    bestZ = player.gridZ;
    score = Math.max(0, bestZ + 1);
    updateScore();
  }

  // Check landed row type
  const row = ensureRow(player.gridZ);
  if (row.type === TYPE.ROAD) {
    // check vehicle collision at arrival
    if (collidesWithVehicle(row, player.gridX)) {
      die('car');
      return;
    }
  } else if (row.type === TYPE.WATER) {
    // must be on a log
    const logInfo = findLogUnderPlayer(row, player.gridX);
    if (logInfo) {
      player.onLog = logInfo;
      player.onLogOffsetX = player.gridX - logInfo.mesh.position.x;
    } else {
      die('water');
      return;
    }
  } else if (row.type === TYPE.RAIL) {
    // immediate check
    if (collidesWithTrain(row, player.gridX)) die('train');
  } else {
    // grass
    player.onLog = null;
    player.onLogOffsetX = 0;
  }

  // poof effect
  spawnPoof(new THREE.Vector3(player.displayX, 0, player.displayZ), 0xffffff);

  player.hopping = false;

  // Process buffered input
  if (inputQueue.length) {
    const next = inputQueue.shift();
    startHop(next[0], next[1]);
  }
}

function collidesWithVehicle(row, gx) {
  if (!row.vehicleMeshes) return false;
  for (const m of row.vehicleMeshes) {
    const dx = m.position.x - gx;
    if (Math.abs(dx) < 0.55) return true;
  }
  return false;
}
function collidesWithTrain(row, gx) {
  if (!row.trainMeshes) return false;
  for (const m of row.trainMeshes) {
    if (Math.abs(m.position.x - gx) < 1.6) return true;
  }
  return false;
}
function findLogUnderPlayer(row, gx) {
  if (!row.logs) return null;
  // Same generous reach as findLogAtX (len/2 + 0.5) so a hop that's allowed
  // by startHop can always be landed by finishHop.
  for (const l of row.logs) {
    const dx = gx - l.mesh.position.x;
    if (Math.abs(dx) < l.len / 2 + 0.5) return l;
  }
  return null;
}
// Used at hop-decision time: is there a log under the cell I want to land on?
// Uses a slightly generous reach (len/2 + 0.5) so the player can hop onto a
// log whose edge is within reach, not only when its center is exactly aligned.
function findLogAtX(row, gx) {
  if (!row.logs) return null;
  let best = null;
  let bestGap = Infinity;
  for (const l of row.logs) {
    const reach = l.len / 2 + 0.5;
    const gap = Math.abs(gx - l.mesh.position.x);
    if (gap <= reach && gap < bestGap) {
      best = l;
      bestGap = gap;
    }
  }
  return best;
}

function die(reason) {
  if (!player.alive) return;
  player.alive = false;
  // big poof
  for (let i = 0; i < 18; i++) spawnPoof(player.group.position, 0xffffff);
  // feathers
  for (let i = 0; i < 14; i++) spawnPoof(player.group.position, 0xfff3a8);
  setTimeout(() => {
    gameState = 'over';
    showOverlay(reason);
  }, 500);
}

// ---------- HUD ----------
const scoreEl = document.getElementById('score');
const bestValEl = document.getElementById('bestVal');
let score = 0;
let bestZ = -1;
let bestScoreStored = parseInt(localStorage.getItem('crossyBest') || '0', 10);
bestValEl.textContent = bestScoreStored;

function updateScore() {
  scoreEl.firstChild.nextSibling ? null : null;
  // Score is the first numeric child after <small>
  scoreEl.innerHTML = `<small>SCORE</small>${score}`;
  if (score > bestScoreStored) {
    bestScoreStored = score;
    localStorage.setItem('crossyBest', String(bestScoreStored));
    bestValEl.textContent = bestScoreStored;
  }
}

// ---------- Game state ----------
let gameState = 'menu'; // 'menu' | 'playing' | 'paused' | 'over'
const overlay = document.getElementById('overlay');
const card = document.getElementById('card');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');

function showOverlay(reason) {
  overlay.classList.remove('hidden');
  card.innerHTML = `
    <h1>GAME OVER</h1>
    <p style="opacity:.7;margin-top:-4px">${reasonText(reason)}</p>
    <div class="big">${score}</div>
    <p>BEST <b style="color:var(--accent)">${bestScoreStored}</b></p>
    <button id="startBtn">PLAY AGAIN</button>
  `;
  document.getElementById('startBtn').addEventListener('click', startGame);
}
function reasonText(r) {
  if (r === 'water') return 'Splash! You fell in the river.';
  if (r === 'car')   return 'Splat! A car got you.';
  if (r === 'train') return 'Wham! Caught by a train.';
  return 'Better luck next time!';
}

function startGame() {
  // reset
  for (const [, row] of rows) disposeRow(row);
  rows.clear();
  rowMemory.length = 0;
  player.gridX = 0; player.gridZ = 0;
  player.displayX = 0; player.displayZ = 0;
  player.alive = true; player.hopping = false; player.onLog = null;
  inputQueue.length = 0;
  score = 0; bestZ = -1;
  updateScore();

  // prebuild a few rows
  for (let z = -ROWS_BEHIND; z <= ROWS_AHEAD; z++) ensureRow(z);

  gameState = 'playing';
  overlay.classList.add('hidden');
  document.getElementById('tip').style.opacity = '0';
}

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    pauseBtn.textContent = '▶';
    overlay.classList.remove('hidden');
    card.innerHTML = `<h1>PAUSED</h1><p>Take a breath.</p><button id="resumeBtn">RESUME</button>`;
    document.getElementById('resumeBtn').addEventListener('click', togglePause);
  } else if (gameState === 'paused') {
    gameState = 'playing';
    pauseBtn.textContent = '❚❚';
    overlay.classList.add('hidden');
  }
}

// ---------- Input ----------
// After 180° camera flip: screen-left key now moves chicken to world +x (camera-right is world -x).
const keyMap = {
  ArrowUp:    [0,  1], KeyW: [0,  1],
  ArrowDown:  [0, -1], KeyS: [0, -1],
  ArrowLeft:  [1, 0], KeyA: [1, 0],
  ArrowRight: [-1,  0], KeyD: [-1,  0],
};
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); return; }
  const m = keyMap[e.code];
  if (m) { e.preventDefault(); tryHop(m[0], m[1]); }
});

// After camera flip: on-screen ◀ (screen-left) → world +x, ▶ (screen-right) → world -x.
document.querySelectorAll('[data-dir]').forEach(b => {
  b.addEventListener('click', () => {
    const d = b.dataset.dir;
    if (d === 'fwd') tryHop(0, 1);
    else if (d === 'back') tryHop(0, -1);
    else if (d === 'left') tryHop(1, 0);
    else if (d === 'right') tryHop(-1, 0);
  });
});
pauseBtn.addEventListener('click', togglePause);
startBtn.addEventListener('click', startGame);

// Touch swipe
let touchStart = null;
window.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }
}, { passive: true });
window.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { touchStart = null; return; }
  if (Math.abs(dx) > Math.abs(dy)) {
    // Swipe right on screen → move toward world -x (camera-right is world -x after flip).
    tryHop(dx > 0 ? -1 : 1, 0);
  } else {
    tryHop(0, dy < 0 ? 1 : -1);
  }
  touchStart = null;
}, { passive: true });

// ---------- Resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Main loop ----------
let lastTime = performance.now();
function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  if (gameState === 'playing') {
    // generate ahead, prune behind
    const targetMaxZ = player.gridZ + ROWS_AHEAD;
    for (let z = player.gridZ - ROWS_BEHIND; z <= targetMaxZ; z++) ensureRow(z);
    pruneRows(player.gridZ);

    // update rows
    for (const [z, row] of rows) {
      // vehicles
      if (row.type === TYPE.ROAD) {
        // spawn more occasionally
        if (!row.spawnTimer) row.spawnTimer = rand(0.4, 1.6);
        row.spawnTimer -= dt;
        if (row.spawnTimer <= 0 && (!row.vehicleMeshes || row.vehicleMeshes.length < 3)) {
          spawnVehicle(row);
          row.spawnTimer = rand(1.2, 2.6) / Math.abs(row.speed) * 4;
        }
        for (let i = (row.vehicleMeshes?.length || 0) - 1; i >= 0; i--) {
          const v = row.vehicles[i];
          v.mesh.position.x += v.speed * dt;
          if (v.mesh.position.x > 12 || v.mesh.position.x < -12) {
            scene.remove(v.mesh);
            row.vehicleMeshes.splice(i, 1);
            row.vehicles.splice(i, 1);
          }
        }
        // collision while on this row and not hopping
        if (player.gridZ === z && !player.hopping && player.alive) {
          if (collidesWithVehicle(row, player.displayX)) die('car');
        }
      } else if (row.type === TYPE.WATER) {
        // spawn logs to maintain density
        if (!row.spawnTimer) row.spawnTimer = rand(0.5, 1.5);
        row.spawnTimer -= dt;
        if (row.spawnTimer <= 0 && (!row.logs || row.logs.length < 3)) {
          spawnLog(row);
          row.spawnTimer = rand(2.0, 3.5);
        }
        for (let i = (row.logs?.length || 0) - 1; i >= 0; i--) {
          const l = row.logs[i];
          l.mesh.position.x += l.speed * dt;
          if (l.mesh.position.x > 12 || l.mesh.position.x < -12) {
            scene.remove(l.mesh);
            row.logMeshes.splice(i, 1);
            row.logs.splice(i, 1);
          }
        }
        // player riding log
        if (player.gridZ === z && !player.hopping && player.alive) {
          if (player.onLog) {
            // move player with log
            const dx = (player.onLog.speed) * dt;
            player.displayX += dx;
            player.gridX = player.displayX; // floating, not snapped to grid
            // check fall off
            if (player.displayX < -7 || player.displayX > 7) {
              die('water');
            } else {
              // still on log?
              const still = findLogUnderPlayer(row, player.displayX);
              if (!still) die('water');
              else player.onLog = still;
            }
          } else {
            die('water');
          }
        }
      } else if (row.type === TYPE.RAIL) {
        row.trainTimer += dt;
        if (!row.trains || row.trains.length === 0) {
          if (row.trainTimer >= row.nextTrainIn) {
            spawnTrain(row);
            row.trainTimer = 0;
            row.nextTrainIn = 4 + Math.random() * 6;
          }
        }
        for (let i = (row.trains?.length || 0) - 1; i >= 0; i--) {
          const t = row.trains[i];
          t.mesh.position.x += t.speed * dt;
          if (t.mesh.position.x > 16 || t.mesh.position.x < -16) {
            scene.remove(t.mesh);
            row.trainMeshes.splice(i, 1);
            row.trains.splice(i, 1);
          }
        }
        if (player.gridZ === z && !player.hopping && player.alive) {
          if (collidesWithTrain(row, player.displayX)) die('train');
        }
      }
    }

    // Player hop animation
    if (player.hopping) {
      const t = Math.min(1, (now - player.hopStart) / HOP_DURATION);
      const ease = t; // could use easeOutCubic
      player.displayX = player.hopFromX + (player.hopToX - player.hopFromX) * ease;
      player.displayZ = player.hopFromZ + (player.hopToZ - player.hopFromZ) * ease;
      // arc
      player.displayY = Math.sin(t * Math.PI) * 0.45;
      player.squash = Math.sin(t * Math.PI) * 0.15;
      if (t >= 1) {
        player.displayY = 0;
        player.squash = 0;
        finishHop();
      }
    } else if (player.onLog) {
      player.displayY = 0.05;
    } else {
      player.displayY = 0;
    }

    // Facing turn animation
    const targetRot = player.facing;
    let cur = player.group.rotation.y;
    // shortest path
    let diff = ((targetRot - cur + Math.PI) % (Math.PI * 2)) - Math.PI;
    player.group.rotation.y = cur + diff * Math.min(1, dt * 12);

    // Position + squash
    player.group.position.set(player.displayX, player.displayY, player.displayZ);
    const sq = 1 - player.squash;
    player.group.scale.set(sq, 1 + player.squash * 0.4, sq);

    // Camera follow
    const targetPos = new THREE.Vector3(
      player.displayX * 0.4 + CAM_OFFSET.x,
      CAM_OFFSET.y,
      player.displayZ + CAM_OFFSET.z
    );
    camera.position.lerp(targetPos, CAM_LERP);
    const lookAt = new THREE.Vector3(
      player.displayX * 0.6,
      CAM_LOOK_OFFSET.y,
      player.displayZ + CAM_LOOK_OFFSET.z
    );
    camera.lookAt(lookAt);

    // Sun follows player so shadows stay sharp
    sun.position.set(player.displayX + 8, 14, player.displayZ + 6);
    sun.target.position.set(player.displayX, 0, player.displayZ);
    sun.target.updateMatrixWorld();
  }

  updateParticles(dt);

  renderer.render(scene, camera);
}
requestAnimationFrame(tick);

// ---------- Initial scene ----------
// prebuild a couple rows so first frame isn't empty
for (let z = -ROWS_BEHIND; z <= 5; z++) ensureRow(z);

// Menu shown until user presses Play.
</script>
</body>
</html>
