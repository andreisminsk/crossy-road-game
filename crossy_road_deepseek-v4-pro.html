<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossy Road 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  #ui {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    color: white; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10; pointer-events: none;
  }
  #gameover {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8); color: white; padding: 30px 50px; border-radius: 20px;
    text-align: center; display: none; z-index: 20;
  }
  #gameover h2 { font-size: 40px; margin-bottom: 10px; }
  #gameover p { font-size: 20px; margin-bottom: 20px; }
  #gameover button {
    padding: 12px 30px; font-size: 20px; background: #f9ca24; border: none;
    border-radius: 10px; cursor: pointer; font-weight: bold;
  }
  #gameover button:hover { background: #f6b93b; }
  #instructions {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 16px; z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="gameover">
  <h2>Game Over</h2>
  <p>Score: <span id="finalScore">0</span></p>
  <button id="restartBtn">Play Again</button>
</div>
<div id="instructions">↑/W/Space hop forward · ↓/S hop back · ←/A move right · →/D move left</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ──────────────────────────────────
// CONSTANTS
// ──────────────────────────────────
const LANE_WIDTH = 1.2;        // depth of each lane (z-axis)
const LANE_LENGTH = 12;        // width of lane (x-axis), obstacles move within
const PLAYER_SIZE = 0.7;
const HOP_HEIGHT = 0.6;
const HOP_DURATION = 0.18;     // seconds
const SIDE_STEP = 0.9;         // how far left/right per move
const SIDE_DURATION = 0.12;    // seconds for side-step animation
const LANES_AHEAD = 20;
const LANES_BEHIND = 5;
const CAR_SPEED_MIN = 1.8;
const CAR_SPEED_MAX = 4.5;
const LOG_SPEED_MIN = 1.2;
const LOG_SPEED_MAX = 2.8;
const RIVER_LOG_COUNT = 3;     // logs per river lane
const ROAD_CAR_COUNT = 2;      // cars per road lane

// ──────────────────────────────────
// SCENE SETUP
// ──────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // sky blue
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1.0, 50);
camera.position.set(0, 7, -8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ──────────────────────────────────
// LIGHTING
// ──────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
sunLight.position.set(10, 20, 5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 60;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -10;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);
scene.add(sunLight.target);

// ──────────────────────────────────
// MATERIALS & GEOMETRIES (reusable)
// ──────────────────────────────────
const grassMat = new THREE.MeshStandardMaterial({ color: 0x6ab04c, roughness: 0.8 });
const roadMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
const waterMat = new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.3, metalness: 0.1 });
const playerMat = new THREE.MeshStandardMaterial({ color: 0xf9ca24, roughness: 0.4, metalness: 0.2 });
const carColors = [0xe74c3c, 0x3498db, 0x2ecc71, 0xf39c12, 0x9b59b6, 0x1abc9c, 0xe67e22];
const carMat = (color) => new THREE.MeshStandardMaterial({ color, roughness: 0.5 });
const logMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.9 });
const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x6b3a2a, roughness: 0.9 });
const treeTopMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.8 });

const laneGeo = new THREE.BoxGeometry(LANE_LENGTH, 0.2, LANE_WIDTH);
const playerGeo = new THREE.BoxGeometry(PLAYER_SIZE, PLAYER_SIZE, PLAYER_SIZE);
const carGeo = new THREE.BoxGeometry(1.0, 0.6, 0.8);
const logGeo = new THREE.BoxGeometry(2.0, 0.4, 0.7);
const treeTrunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.8, 6);
const treeTopGeo = new THREE.ConeGeometry(0.4, 0.9, 8);

// ──────────────────────────────────
// GAME STATE
// ──────────────────────────────────
const lanes = [];               // array of lane objects { type, z, mesh, obstacles: [] }
let player = {
  mesh: null,
  laneIndex: 0,                // which lane the player is currently on (index into lanes)
  targetLaneIndex: 0,
  x: 0,                        // x position within lane
  hopping: false,
  hopProgress: 0,
  hopStartZ: 0,           // world-space Z at start of hop (immune to index shifts)
  hopEndZ: 0,             // world-space Z at end of hop
  sideStepping: false,
  sideStepProgress: 0,
  sideStepFrom: 0,
  sideStepTo: 0,
  alive: true,
  offLogTime: 0           // seconds spent not on a log (grace period before drowning)
};
let score = 0;
let gameOver = false;
let lastTime = performance.now();

// UI elements
const scoreEl = document.getElementById('score');
const gameoverEl = document.getElementById('gameover');
const finalScoreEl = document.getElementById('finalScore');
const restartBtn = document.getElementById('restartBtn');

// ──────────────────────────────────
// HELPER: create a lane mesh + obstacles
// ──────────────────────────────────
function createLane(type, zPos) {
  const group = new THREE.Group();
  group.position.z = zPos;

  // Base platform
  let mat;
  if (type === 'grass') mat = grassMat;
  else if (type === 'road') mat = roadMat;
  else mat = waterMat;
  const base = new THREE.Mesh(laneGeo, mat);
  base.position.y = -0.15;
  base.receiveShadow = true;
  base.castShadow = false;
  group.add(base);

  const obstacles = [];

  if (type === 'grass') {
    // Add decorative trees (static, not obstacles)
    const treeCount = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < treeCount; i++) {
      const x = (Math.random() - 0.5) * (LANE_LENGTH - 1.5);
      const treeGroup = new THREE.Group();
      treeGroup.position.set(x, 0.2, (Math.random() - 0.5) * 0.4);
      const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
      trunk.position.y = 0.4;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      treeGroup.add(trunk);
      const top = new THREE.Mesh(treeTopGeo, treeTopMat);
      top.position.y = 1.0;
      top.castShadow = true;
      top.receiveShadow = true;
      treeGroup.add(top);
      group.add(treeGroup);
    }
  } else if (type === 'road') {
    // Cars moving left or right
    const direction = Math.random() > 0.5 ? 1 : -1; // 1 = right (+x), -1 = left (-x)
    const speed = CAR_SPEED_MIN + Math.random() * (CAR_SPEED_MAX - CAR_SPEED_MIN);
    for (let i = 0; i < ROAD_CAR_COUNT; i++) {
      const carColor = carColors[Math.floor(Math.random() * carColors.length)];
      const car = new THREE.Mesh(carGeo, carMat(carColor));
      car.position.y = 0.3;
      car.castShadow = true;
      car.receiveShadow = true;
      // Random start x, avoid overlapping too much
      car.position.x = (Math.random() - 0.5) * (LANE_LENGTH - 2) * 0.8;
      car.userData = {
        direction,
        speed,
        laneType: 'road'
      };
      group.add(car);
      obstacles.push(car);
    }
  } else if (type === 'river') {
    // Logs moving left or right
    const direction = Math.random() > 0.5 ? 1 : -1;
    const speed = LOG_SPEED_MIN + Math.random() * (LOG_SPEED_MAX - LOG_SPEED_MIN);
    for (let i = 0; i < RIVER_LOG_COUNT; i++) {
      const log = new THREE.Mesh(logGeo, logMat);
      log.position.y = 0.2;
      log.castShadow = true;
      log.receiveShadow = true;
      log.position.x = (Math.random() - 0.5) * (LANE_LENGTH - 2.5) * 0.7;
      log.userData = {
        direction,
        speed,
        laneType: 'river'
      };
      group.add(log);
      obstacles.push(log);
    }
  }

  scene.add(group);
  return { type, z: zPos, mesh: group, obstacles };
}

// ──────────────────────────────────
// INITIAL LANE GENERATION
// ──────────────────────────────────
function generateInitialLanes() {
  // Clear existing
  lanes.forEach(l => scene.remove(l.mesh));
  lanes.length = 0;

  // Pre-generate behind lanes (so manageLanes has nothing to add on first frame)
  let prevType = 'grass';
  for (let i = LANES_BEHIND; i >= 1; i--) {
    const z = -i * LANE_WIDTH;
    const type = randomLaneType(prevType);
    lanes.push(createLane(type, z));
    prevType = type;
  }

  // Starting lane (always grass)
  lanes.push(createLane('grass', 0));
  prevType = 'grass';

  // Generate lanes ahead
  for (let i = 1; i < LANES_AHEAD; i++) {
    const z = i * LANE_WIDTH;
    const type = randomLaneType(prevType);
    lanes.push(createLane(type, z));
    prevType = type;
  }
}

// ──────────────────────────────────
// PLAYER SETUP
// ──────────────────────────────────
function createPlayer() {
  const mesh = new THREE.Mesh(playerGeo, playerMat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.position.set(0, PLAYER_SIZE/2, 0);
  scene.add(mesh);
  return mesh;
}

// ──────────────────────────────────
// RESET GAME
// ──────────────────────────────────
function resetGame() {
  if (player.mesh) scene.remove(player.mesh);
  player.mesh = createPlayer();
  player.laneIndex = 0;
  player.targetLaneIndex = 0;
  player.x = 0;
  player.hopping = false;
  player.hopProgress = 0;
  player.hopStartZ = 0;
  player.hopEndZ = 0;
  player.sideStepping = false;
  player.sideStepProgress = 0;
  player.sideStepFrom = 0;
  player.sideStepTo = 0;
  player.alive = true;
  player.offLogTime = 0;
  score = 0;
  gameOver = false;
  gameoverEl.style.display = 'none';
  scoreEl.textContent = '0';
  generateInitialLanes();
  // Position player on the starting lane (index LANES_BEHIND, z=0)
  player.laneIndex = LANES_BEHIND;
  player.targetLaneIndex = LANES_BEHIND;
  player.mesh.position.set(0, PLAYER_SIZE/2, 0);
}

// ──────────────────────────────────
// MOVE PLAYER FORWARD
// ──────────────────────────────────
function hopForward() {
  if (!player.alive || gameOver || player.hopping || player.sideStepping) return;
  const targetZ = player.mesh.position.z + LANE_WIDTH;
  // Ensure a lane exists at the target Z (manageLanes will fill gaps, but check roughly)
  if (lanes.length === 0) return;
  if (targetZ > lanes[lanes.length-1].z + LANE_WIDTH * 0.5) return;

  player.hopStartZ = player.mesh.position.z;
  player.hopEndZ = targetZ;
  player.hopping = true;
  player.hopProgress = 0;
}

// ──────────────────────────────────
// MOVE PLAYER BACKWARD
// ──────────────────────────────────
function hopBackward() {
  if (!player.alive || gameOver || player.hopping || player.sideStepping) return;
  const targetZ = player.mesh.position.z - LANE_WIDTH;
  if (lanes.length === 0) return;
  if (targetZ < lanes[0].z - LANE_WIDTH * 0.5) return;

  player.hopStartZ = player.mesh.position.z;
  player.hopEndZ = targetZ;
  player.hopping = true;
  player.hopProgress = 0;
}

// ──────────────────────────────────
// MOVE PLAYER SIDEWAYS
// ──────────────────────────────────
function moveSideways(direction) {
  if (!player.alive || gameOver || player.hopping || player.sideStepping) return;
  const newX = player.x + direction * SIDE_STEP;
  // Clamp within lane bounds
  const clamped = Math.max(-LANE_LENGTH/2 + PLAYER_SIZE/2, Math.min(LANE_LENGTH/2 - PLAYER_SIZE/2, newX));
  if (clamped === player.x) return; // already at edge
  player.sideStepping = true;
  player.sideStepProgress = 0;
  player.sideStepFrom = player.x;
  player.sideStepTo = clamped;
}

// ──────────────────────────────────
// UPDATE OBSTACLES (cars & logs)
// ──────────────────────────────────
function updateObstacles(deltaTime) {
  for (const lane of lanes) {
    if (lane.type === 'grass') continue;
    for (const obs of lane.obstacles) {
      const data = obs.userData;
      obs.position.x += data.direction * data.speed * deltaTime;
      // Wrap around when leaving lane
      const halfLen = LANE_LENGTH / 2;
      if (obs.position.x > halfLen + 1) obs.position.x = -halfLen - 0.5;
      if (obs.position.x < -halfLen - 1) obs.position.x = halfLen + 0.5;
    }
  }
}

// ──────────────────────────────────
// CHECK COLLISIONS & RIVER SAFETY
// ──────────────────────────────────
function checkCollisions() {
  if (!player.alive) return;
  const lane = lanes[player.laneIndex];
  if (!lane) return;

  const px = player.x;
  const pz = player.mesh.position.z;
  const halfSize = PLAYER_SIZE / 2;

  if (lane.type === 'road') {
    // Check collision with any car
    for (const car of lane.obstacles) {
      const cx = car.position.x;
      const cz = car.position.z + lane.z; // car is in lane group, so world z = group.z + local z
      // Simple AABB (x and z overlap)
      const carHalfX = 0.5;
      const carHalfZ = 0.4;
      if (Math.abs(px - cx) < halfSize + carHalfX &&
          Math.abs(pz - cz) < halfSize + carHalfZ) {
        killPlayer();
        return;
      }
    }
  } else if (lane.type === 'river') {
    // River safety is handled in updatePlayerX with a grace period.
    // Don't kill instantly here — let the player step onto a log.
  }
}

function killPlayer() {
  if (!player.alive) return;
  player.alive = false;
  gameOver = true;
  // Sink animation
  player.mesh.position.y = -0.5;
  finalScoreEl.textContent = score;
  gameoverEl.style.display = 'block';
}

// ──────────────────────────────────
// RANDOM LANE TYPE HELPER
// ──────────────────────────────────
function randomLaneType(prevType) {
  if (prevType === 'river') {
    return Math.random() < 0.5 ? 'grass' : 'road';
  }
  const r = Math.random();
  if (r < 0.4) return 'grass';
  if (r < 0.75) return 'road';
  return 'river';
}

// ──────────────────────────────────
// MANAGE LANES (add new, remove old)
// Uses player world-Z as stable reference to avoid index oscillation.
// ──────────────────────────────────
function manageLanes() {
  const playerZ = player.mesh.position.z;
  const minZ = playerZ - LANES_BEHIND * LANE_WIDTH;
  const maxZ = playerZ + LANES_AHEAD * LANE_WIDTH;

  // Remove lanes too far behind
  while (lanes.length > 0 && lanes[0].z < minZ - LANE_WIDTH * 0.5) {
    scene.remove(lanes.shift().mesh);
  }
  // Remove lanes too far ahead
  while (lanes.length > 0 && lanes[lanes.length-1].z > maxZ + LANE_WIDTH * 0.5) {
    scene.remove(lanes.pop().mesh);
  }

  // Add lanes behind if needed
  while (lanes.length === 0 || lanes[0].z > minZ) {
    const first = lanes[0];
    const newZ = first ? first.z - LANE_WIDTH : Math.floor(playerZ / LANE_WIDTH) * LANE_WIDTH - LANE_WIDTH;
    lanes.unshift(createLane(randomLaneType(first ? first.type : 'grass'), newZ));
  }

  // Add lanes ahead if needed
  while (lanes.length === 0 || lanes[lanes.length-1].z < maxZ) {
    const last = lanes[lanes.length-1];
    const newZ = last ? last.z + LANE_WIDTH : Math.floor(playerZ / LANE_WIDTH) * LANE_WIDTH + LANE_WIDTH;
    lanes.push(createLane(randomLaneType(last ? last.type : 'grass'), newZ));
  }

  // Re-sync player laneIndex from world Z (stable, no index drift)
  let bestIdx = 0;
  let bestDist = Infinity;
  for (let i = 0; i < lanes.length; i++) {
    const dist = Math.abs(lanes[i].z - playerZ);
    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
  }
  player.laneIndex = bestIdx;
  if (!player.hopping) {
    player.targetLaneIndex = bestIdx;
  }
}

// ──────────────────────────────────
// UPDATE PLAYER HOP ANIMATION
// ──────────────────────────────────
function updatePlayerHop(deltaTime) {
  if (!player.hopping) return;
  player.hopProgress += deltaTime / HOP_DURATION;
  if (player.hopProgress >= 1.0) {
    player.hopProgress = 1.0;
    player.hopping = false;
    player.mesh.position.z = player.hopEndZ;
    player.mesh.position.y = PLAYER_SIZE/2;
    score = Math.max(score, player.laneIndex);
    scoreEl.textContent = score;
    checkCollisions();
    return;
  }
  const t = player.hopProgress;
  const z = THREE.MathUtils.lerp(player.hopStartZ, player.hopEndZ, t);
  const yOffset = Math.sin(t * Math.PI) * HOP_HEIGHT;
  player.mesh.position.z = z;
  player.mesh.position.y = PLAYER_SIZE/2 + yOffset;
}

// ──────────────────────────────────
// UPDATE PLAYER SIDE-STEP ANIMATION
// ──────────────────────────────────
function updatePlayerSideStep(deltaTime) {
  if (!player.sideStepping) return;
  player.sideStepProgress += deltaTime / SIDE_DURATION;
  if (player.sideStepProgress >= 1.0) {
    player.sideStepProgress = 1.0;
    player.sideStepping = false;
    player.x = player.sideStepTo;
    player.mesh.position.x = player.x;
    // Re-check river safety after side-step
    const lane = lanes[player.laneIndex];
    if (lane && lane.type === 'river') {
      updatePlayerX(0); // immediate check
    }
    return;
  }
  const t = player.sideStepProgress;
  const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
  player.x = THREE.MathUtils.lerp(player.sideStepFrom, player.sideStepTo, eased);
  player.mesh.position.x = player.x;
}

// ──────────────────────────────────
// UPDATE PLAYER X (log riding)
// ──────────────────────────────────
function updatePlayerX(deltaTime) {
  if (!player.alive) return;
  if (player.hopping) return; // don't check river safety mid-hop
  const lane = lanes[player.laneIndex];
  if (!lane || lane.type !== 'river') {
    player.offLogTime = 0; // reset grace timer when not on river
    return;
  }
  // Check log attachment
  let onLog = false;
  for (const log of lane.obstacles) {
    const lx = log.position.x;
    const lz = log.position.z + lane.z;
    const halfSize = PLAYER_SIZE/2;
    if (Math.abs(player.x - lx) < halfSize + 1.0 &&
        Math.abs(player.mesh.position.z - lz) < halfSize + 0.35) {
      onLog = true;
      player.x += log.userData.direction * log.userData.speed * deltaTime;
      break;
    }
  }
  if (onLog) {
    player.offLogTime = 0; // reset grace timer
  } else {
    player.offLogTime += deltaTime;
    if (player.offLogTime > 0.3) { // 300ms grace period
      killPlayer();
      return;
    }
  }
  // Clamp x within lane bounds
  player.x = Math.max(-LANE_LENGTH/2 + PLAYER_SIZE/2, Math.min(LANE_LENGTH/2 - PLAYER_SIZE/2, player.x));
  player.mesh.position.x = player.x;
}

// ──────────────────────────────────
// GAME LOOP
// ──────────────────────────────────
function animate(timestamp) {
  requestAnimationFrame(animate);

  const deltaTime = Math.min(0.1, (timestamp - lastTime) / 1000); // seconds, cap at 100ms
  lastTime = timestamp;

  if (!gameOver && player.alive) {
    updateObstacles(deltaTime);
    updatePlayerHop(deltaTime);
    updatePlayerSideStep(deltaTime);
    updatePlayerX(deltaTime);
    manageLanes();
    // Check collisions for non-river lanes (river handled in updatePlayerX)
    if (player.alive) {
      const lane = lanes[player.laneIndex];
      if (lane && lane.type === 'road') {
        checkCollisions();
      }
    }
  }

  // Camera follows player smoothly (opposite side — player moves toward camera)
  const targetCamZ = player.mesh.position.z - 5;
  const targetCamY = 7;
  camera.position.z += (targetCamZ - camera.position.z) * 0.1;
  camera.position.y += (targetCamY - camera.position.y) * 0.1;
  camera.lookAt(player.mesh.position.x, player.mesh.position.y, player.mesh.position.z + 2);

  renderer.render(scene, camera);
}

// ──────────────────────────────────
// INPUT HANDLING
// ──────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    hopForward();
  } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
    e.preventDefault();
    moveSideways(1);   // swapped: left key moves right
  } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
    e.preventDefault();
    moveSideways(-1);  // swapped: right key moves left
  } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
    e.preventDefault();
    hopBackward();
  }
});

window.addEventListener('click', () => hopForward());
window.addEventListener('touchstart', (e) => {
  e.preventDefault();
  hopForward();
}, { passive: false });

restartBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  resetGame();
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ──────────────────────────────────
// START
// ──────────────────────────────────
resetGame();
lastTime = performance.now();
requestAnimationFrame(animate);
</script>
</body>
</html>
